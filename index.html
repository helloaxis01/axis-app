function getCircadianPeriod() {
  const h = new Date().getHours();
  if (h >= 5 && h < 11) return "dawn";
  if (h >= 11 && h < 17) return "midday";
  if (h >= 17 && h < 22) return "prime";
  return "rest";
}

/** sRGB relative luminance → readable ink on solid circadian accent fills */
function inkForAccentHex(hex) {
  const m = /^#?([0-9a-f]{6})$/i.exec(String(hex || "").trim());
  if (!m) return null;
  const n = parseInt(m[1], 16);
  const rs = (n >> 16) / 255, gs = ((n >> 8) & 255) / 255, bs = (n & 255) / 255;
  const lin = (v) => v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  const L = 0.2126 * lin(rs) + 0.7152 * lin(gs) + 0.0722 * lin(bs);
  return L < 0.43 ? "var(--axis-white)" : "var(--axis-black)";
}

  // Derive cue-bar, tab-bg, and accent-secondary from accent so they always match
  const accentSec = t.accent && t.accent.match(/^#[0-9a-fA-F]{6}$/) ? t.accent + "99" : t.accentSecondary || t.accent;
  el.textContent = `

function getSections(trackId) {
  try {
    if (!TRACKS || !trackId || !TRACKS[trackId]) return [];
    return TRACKS[trackId].sections || [];
  } catch (e) {
    return [];
  }
}
function getAll(trackId) {
  const secs = getSections(trackId) || [];
  return secs.flatMap((s) => (s.exercises || []).map((e) => ({ ...e, sectionLabel: s.label })));
}
function exerciseSeconds(ex, fallbackSec) {
  const s = ex.seconds;
  const n = typeof s === 'number' ? s : typeof s === 'string' ? Number(s) : NaN;
  return n > 0 && Number.isFinite(n) ? n : fallbackSec || 45;
}
function exerciseSecondsFromSections(exId, sections, fallbackSec) {
  for (const sec of sections || []) {
    const ex = sec.exercises && sec.exercises.find((e) => e.id === exId || Number(e.id) === Number(exId));
    if (ex != null) {
      const s = ex.seconds;
      const n = typeof s === 'number' ? s : typeof s === 'string' ? Number(s) : NaN;
      if (n > 0 && Number.isFinite(n)) return n;
      return fallbackSec || 45;
    }
  }
  return fallbackSec || 45;
}

function storageGet(key, def) {
  try {const v = localStorage.getItem(key);return v !== null ? JSON.parse(v) : def;} catch {return def;}
}
function storageSet(key, val) {
  try {localStorage.setItem(key, JSON.stringify(val));} catch {}
}

function computeSessionSeconds(totalCount, fullSecondsFromLabel, activeCount) {
  if (totalCount > 0 && fullSecondsFromLabel > 0) {
    return Math.round(fullSecondsFromLabel * activeCount / totalCount);
  }
  return 0;
}

// Error capture helper — records errors and promise rejections to localStorage.
// Useful for opaque "Script error" on iOS/Safari; reproduce the issue and then
// check localStorage.getItem('axis_errors') in Safari Web Inspector.
(function installAxisErrorCapture() {
  try {
    function saveRecord(rec) {
      try {
        const existing = JSON.parse(localStorage.getItem('axis_errors') || '[]');
        existing.push(rec);
        // keep last 30
        localStorage.setItem('axis_errors', JSON.stringify(existing.slice(-30)));
        // also expose the last error for quick inspection
        window.__axis_last_error = rec;
      } catch (e) {/* swallow */}
    }

    window.addEventListener('error', function (ev) {
      try {
        const rec = {
          type: 'error',
          message: ev.message || String(ev.error || ev),
          filename: ev.filename || null,
          lineno: ev.lineno || null,
          colno: ev.colno || null,
          stack: ev.error && ev.error.stack ? ev.error.stack : ev.error && ev.error.toString ? ev.error.toString() : null,
          time: new Date().toISOString()
        };
        saveRecord(rec);
      } catch (e) {}
    }, { passive: true });

    window.addEventListener('unhandledrejection', function (ev) {
      try {
        const reason = ev.reason;
        const rec = {
          type: 'unhandledrejection',
          message: reason && reason.message ? reason.message : String(reason),
          stack: reason && reason.stack ? reason.stack : null,
          time: new Date().toISOString()
        };
        saveRecord(rec);
      } catch (e) {}
    }, { passive: true });
  } catch (e) {}
})();

  [data-night="true"] .prog-bar { background: #000000 !important; border: 1px solid #FF0000 !important; }

  [data-night="true"] .chk { background: #000000 !important; border-color: #FF0000 !important; }
  [data-night="true"] .chk.on { background: #FF0000 !important; border-color: #FF0000 !important; }
  [data-night="true"] .hdr-dur { background: #000000 !important; border-color: #FF0000 !important; }

  /* TODAY hero (night): .app color is red — force black copy on red card; CTA = black pill + red label (Safari/WebKit) */
  .app[data-night="true"] .start-here-group > div {

  }
  .app[data-night="true"] .start-here-group .begin-btn--today-primary {

  /* TODAY hero: explicit red card (public .track-group { transparent } must not win over this) */
  .app[data-night="true"] .home .track-group.start-here-group {

  .app[data-night="true"] .hdr-title,
  .app[data-night="true"] .hdr-subtitle,
  .app[data-night="true"] .tab-desc-line {

    -webkit-text-fill-color: #FF0000 !important;

  /* All night pills (track cards + session header): base uses rgba white border — invisible on #000 in Chromium */
  .app[data-night="true"] .glass-label {

  /* Keep Night Mode simple: no glows/shadows */
  [data-night="true"] .tab-btn.active .tab-icon-shell::before { background: none !important; filter: none !important; -webkit-filter: none !important; }
  [data-night="true"] .fv-cta, [data-night="true"] .fv-cta:hover, [data-night="true"] .fv-cta:active,
  [data-night="true"] .fv-skip, [data-night="true"] .fv-prev { box-shadow: none !important; }
  [data-night="true"] .tab-live-dot { box-shadow: none !important; }
  /* Night accent-fill CTAs: black ink on #FF0000 (Safari/WebKit; beats any broad * { color: red !important }) */
  .app[data-night="true"] .content .fv-cta:not(.done),
  .app[data-night="true"] .content .fv-cta:not(.done) *,
  .app[data-night="true"] .content .tb {
    color: #000000 !important;
    -webkit-text-fill-color: #000000 !important;
  }
  .app[data-night="true"] .content .fv-cta:not(.done) {
    background: #FF0000 !important;
    border: none !important;
  }
  .app[data-night="true"] .content .tb {
    background: #FF0000 !important;
    border: none !important;
  }
  [data-night="true"].guided-overlay .guided-cta-fill {
    color: #000000 !important;
    -webkit-text-fill-color: #000000 !important;
  }
  .app[data-night="true"] .timer-view-body .timer-glass-btn-pri {
    background: #FF0000 !important;
    border: none !important;
    color: #000000 !important;
    -webkit-text-fill-color: #000000 !important;
  }
  /* ── BASE ── */
  .app {
    --axis-tab-h: 64px;
    --axis-tab-clearance: 24px;
    --axis-bottom-content-inset: 120px;
    min-height:100vh;
    min-height:100dvh;
    height:100%;
    width:100%;
    max-width:100vw;
    min-width:0;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    background: var(--bg-app, var(--bg-gradient));
    background-color: var(--bg-fallback, #0a1525);
    color:var(--text-primary);
    font-family:var(--font-display);
    font-weight: 400;
    position:relative;
    transition:color 0.3s;
    box-sizing:border-box;
  }
  @media (prefers-reduced-motion: no-preference) {
    [data-theme]:not([data-night="true"]) .app {
      background: var(--bg-fallback, #0a1525);
      transition: color 0.3s ease, background var(--motion-slow), background-color var(--motion-slow);
    }
    [data-theme]:not([data-night="true"]) .app::before,
    [data-theme]:not([data-night="true"]) .app::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      transition: opacity var(--motion-slow);
    }
    [data-theme]:not([data-night="true"]) .app::before {
      background: var(--bg-app-a, var(--bg-app, var(--bg-gradient)));
      opacity: 1;
    }
    [data-theme]:not([data-night="true"]) .app::after {
      background: var(--bg-app-b, var(--bg-app, var(--bg-gradient)));
      opacity: 0;
    }
    html.axis-mood-xfade--b-top [data-theme]:not([data-night="true"]) .app::before {
      opacity: 0;
    }
    html.axis-mood-xfade--b-top [data-theme]:not([data-night="true"]) .app::after {
      opacity: 1;
    }
    [data-theme]:not([data-night="true"]) .tab-btn.active .tab-icon-shell::before,
    [data-theme]:not([data-night="true"]) .tab-live-dot,
    [data-theme]:not([data-night="true"]) .track-btn.active,
    [data-theme]:not([data-night="true"]) .fav-toggle.on {
      transition: background var(--motion-slow), color var(--motion-slow), border-color var(--motion-slow), box-shadow var(--motion-slow);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    [data-theme]:not([data-night="true"]) .app::before,
    [data-theme]:not([data-night="true"]) .app::after {
      content: none !important;
      display: none !important;
    }
  }
  .app-body { flex:1; display:flex; flex-direction:column; width:100%; position:relative; min-height:0; z-index: 1; }
  .app-orbs { position:fixed; inset:0; z-index:1; pointer-events:none; }
  .app-orbs::after {
    content:''; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 40%, rgba(255,255,255,0.02) 60%, transparent 100%);
  }
  @keyframes flowFadeIn {
    from { opacity:0; transform:scale(0.92); }
    to   { opacity:1; transform:scale(1); }
  }
  @keyframes flowDonePop {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(0.5); }
    50%  { opacity:1; transform:translate(-50%,-50%) scale(1.1); }
    100% { opacity:1; transform:translate(-50%,-50%) scale(1); }
  }

  /* ── GLASS CARD ── */
  .glass-card,
  .today-card {
    border-top: 1px solid rgba(255, 255, 255, 0.15) !important;
  }
  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-specular);
    border-radius: 16px;
    transition: background 0.22s, border-color 0.22s, box-shadow 0.22s, transform 0.22s;
    position:relative; overflow:hidden;
  }
  .glass-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--glass-specular) 30%, rgba(255,255,255,0.20) 50%, var(--glass-specular) 70%, transparent);
    pointer-events:none;
  }
  .glass-card:hover {
    background: var(--glass-bg-hover);
    border-color: var(--glass-border-strong);
    box-shadow: var(--glass-shadow-lg), inset 0 1px 0 var(--glass-specular);
  }

  /* ── HEADER ── */
  .hdr-wrap {
    position:sticky; top:0; z-index:200; width:100%;
    background: var(--hdr-bg);
    backdrop-filter: blur(40px) saturate(2.0);
    -webkit-backdrop-filter: blur(40px) saturate(2.0);
    border-bottom: 1px solid var(--glass-border);
    box-shadow: 0 1px 0 var(--glass-specular), 0 4px 20px rgba(0,0,0,0.15);
    box-sizing:border-box;
    padding-top: env(safe-area-inset-top, 0px);
  }
  .hdr { padding:0 20px; box-sizing:border-box; width:100%; }
  .hdr-row { display:flex; justify-content:flex-start; align-items:flex-start; padding:6px 0 12px; }
  .hdr-left { flex:1; display:flex; flex-direction:column; gap:4px; align-items:flex-start; }
  .back-btn {
    background:none; border:none; font-family:var(--font-display); font-size: var(--text-sm); letter-spacing:0.18em; text-transform:uppercase;
    color:var(--text-secondary); cursor:pointer; padding:12px 14px 12px 8px; transition:color 0.15s, transform var(--motion-fast), opacity var(--motion-fast);
    display:inline-flex; align-items:center; min-height:44px; box-sizing:border-box; -webkit-tap-highlight-color: transparent;
  }
  .back-btn:hover { color:var(--text-primary); }
  .back-btn:active { transform: scale(0.97); opacity: 0.9; }
  .hdr-title { font-size: var(--text-xl); font-weight: 600; letter-spacing:-0.02em; line-height:1.2; color:var(--text-white); }
  .hdr-meta { display:flex; gap:14px; margin-top:3px; align-items:center; }
  .hdr-subtitle { font-size: var(--text-sm); color:var(--text-secondary); font-style:italic; }
  .hdr-dur {
    font-size: var(--text-sm); letter-spacing:0.14em; text-transform:uppercase; color:var(--text-secondary);
    background:var(--glass-bg); border:1px solid var(--glass-border); padding:3px 12px; border-radius:4px;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    position: relative;
    overflow: hidden;
  }
  .hdr-dur::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    pointer-events: none;
    background: linear-gradient(90deg, transparent, var(--glass-specular) 50%, transparent);
  }

  /* ── SESSION / STREAK BAR ── */
  .streak-bar { display:flex; align-items:center; gap:8px; padding:8px 0 10px; border-bottom:1px solid var(--border); }
  .streak-divider { width:1px; height:14px; background:var(--glass-border); }
  .session-time { font-size: var(--text-base); color:var(--text-secondary); letter-spacing:0.02em; font-weight:400; }
  .session-time-lbl { font-size: var(--text-sm); color:var(--text-dim); letter-spacing:0.14em; text-transform:uppercase; margin-left:4px; }
  .prog-bar { height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
  .prog-fill { height:2px; background:linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 50%, transparent)); transition:width 0.6s cubic-bezier(0.4,0,0.2,1); box-shadow:0 0 10px var(--accent-glow); }

  /* ── TRACK SCROLL ── */
  .track-scroll { overflow-x:auto; display:flex; gap:6px; padding:10px 20px 10px; margin:0 -20px; border-bottom:1px solid var(--border); scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  .track-scroll::-webkit-scrollbar { display:none; }
  .track-btn {
    padding:5px 16px; font-family:var(--font-display); font-size: var(--text-sm); font-weight: 600;
    letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; transition:all 0.2s;
    white-space:nowrap; flex-shrink:0; border-radius:20px;
    background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--text-secondary);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }
  .track-btn.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); box-shadow:0 0 12px var(--accent-glow); }

  /* ── TABS ── */
  .tabs {
    display:flex; gap:0; width:100%;
    background:transparent;
    padding:0;
  }
  .tab {
    flex:1; padding:13px 0 11px; font-family:var(--font-display); font-size: var(--text-xs); font-weight:600;
    letter-spacing:0.16em; text-transform:uppercase; border:none; cursor:pointer;
    background:transparent; color:var(--text-dimmer); transition:all 0.18s;
    min-width:0; white-space:nowrap; position:relative;
    border-bottom: 2px solid transparent;
  }
  .tab.on {
    color:var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(255,255,255,0.04);
    box-shadow: 0 1px 0 rgba(255,255,255,0.06);
  }
  /* sub-bar: tab-desc + progress live here, bleeds to edges, floats above content */
  .tab-subbar {
    position:sticky; top: var(--hdr-height, 120px); z-index:190;
    background: var(--hdr-bg);
    backdrop-filter: blur(40px) saturate(2.0);
    -webkit-backdrop-filter: blur(40px) saturate(2.0);
    box-shadow: 0 4px 20px rgba(0,0,0,0.18), 0 1px 0 var(--glass-border);
    margin: 0 -20px;
    padding: 10px 20px 12px;
  }
  .tab-desc-line {
    font-size: var(--text-sm); color:var(--text-secondary);
    letter-spacing:0.03em; line-height:1.35;
    padding-bottom: 8px;
  }
  .tab-prog-row {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:6px;
  }

  /* ── CONTENT ── */
  .content { padding:0 20px 24px; max-width:100%; position:relative; z-index:1; }
  .content.content--session { padding-bottom: 12px; }
  .content.content--session.content--session-list { padding-bottom: 100px; }
  /* LIST + GUIDED: breathing room above tab bar for primary CTAs */
  .session-cta-pad { margin-bottom: var(--axis-safe-bottom); padding-bottom: 12px; }
  .session-cta-pad--guided { margin-bottom: 0; padding-bottom: 0; }
  .sg {
    margin-top:32px;
    background:var(--glass-bg);
    backdrop-filter:blur(24px) saturate(1.8); -webkit-backdrop-filter:blur(24px) saturate(1.8);
    border:1px solid var(--glass-border);
    border-radius:22px;
    padding:18px 20px;
    box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-specular);
  }
  .sh { display:flex; align-items:baseline; gap:14px; padding-bottom:14px; border-bottom:1px solid var(--border); margin-bottom:12px; }
  .sh-tag { font-size: var(--text-xs); color:var(--text-dimmer); letter-spacing:0.12em; }
  .sh-name { font-size: var(--text-base); font-weight: 600; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-secondary); }
  .sh-ct { margin-left:auto; font-size: var(--text-sm); color:var(--text-dimmer); }

  /* ── PURPOSE NOTE ── */

  }

  .reps-row { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-top:8px; border-top:1px solid var(--border); padding-top:14px; flex-wrap:nowrap; }

  /* ── GUIDED CARD ── */

  .fc-right { padding:0 0 20px 14px; flex:1; }

  .fc-pfocus {

  .fc-reps { border-top:1px solid var(--border); padding-top:14px; margin-bottom:14px; }
  /* flow fullscreen overlay */

  }
  .fv-top-bar {

  /* main card */

async function bootstrapAxisApp() {
  console.log("BASE REVERT SUCCESSFUL");
  window.__AXIS_DATA_LOAD_ERROR = "";
  try {
    const res = await fetch("./axis_data.json", { cache: "no-store" });
    if (!res.ok) throw new Error("axis_data.json: HTTP " + res.status);
    const data = await res.json();
    window.AXIS_JSON = data;
    if (data && data.TRACKS && Object.keys(data.TRACKS).length) {
      TRACKS = data.TRACKS;
    } else {
      throw new Error("axis_data.json: missing TRACKS");
    }
  } catch (err) {
    console.error("AXIS: workout data load failed", err);
    TRACKS = TRACKS_DATA_FALLBACK;
    window.__AXIS_DATA_LOAD_ERROR = "Workout library could not be loaded from axis_data.json. Sessions will be empty until the file is available next to this page. (" + (err && err.message ? err.message : String(err)) + ")";
  }
  try {
    if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
      showLoadErr("App libraries did not load. Check your connection and refresh.");
      return;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  } catch (e) {
    showLoadErr("Error: " + (e && e.message ? e.message : String(e)) + (e && e.stack ? "\n\n" + e.stack : ""));
  }
}
