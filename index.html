function getCircadianPeriod() {
  const h = new Date().getHours();
  if (h >= 5 && h < 11) return "dawn";
  if (h >= 11 && h < 17) return "midday";
  if (h >= 17 && h < 22) return "prime";
  return "rest";
}

/** Parse #RRGGBB → [r,g,b] for rgba() fills (Today card tint, glows). */
function axisHexToRgbTuple(hex) {
  const m = /^#?([0-9a-f]{6})$/i.exec(String(hex || "").trim());
  if (!m) return null;
  const n = parseInt(m[1], 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

/** sRGB relative luminance → readable ink on solid circadian accent fills */
function inkForAccentHex(hex) {
  const m = /^#?([0-9a-f]{6})$/i.exec(String(hex || "").trim());
  if (!m) return null;
  const n = parseInt(m[1], 16);
  const rs = (n >> 16) / 255, gs = ((n >> 8) & 255) / 255, bs = (n & 255) / 255;
  const lin = (v) => v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  const L = 0.2126 * lin(rs) + 0.7152 * lin(gs) + 0.0722 * lin(bs);
  return L < 0.43 ? "var(--axis-white)" : "var(--axis-black)";
}

function applyCircadianTheme(isDark, period) {
  const p = period || getCircadianPeriod();
  const t = CIRCADIAN_THEMES[p][isDark ? "dark" : "light"];
  let el = document.getElementById("circadian-style");
  if (!el) {el = document.createElement("style");el.id = "circadian-style";document.head.appendChild(el);}
  // Derive cue-bar, tab-bg, and accent-secondary from accent so they always match
  const accentSec = t.accent && t.accent.match(/^#[0-9a-fA-F]{6}$/) ? t.accent + "99" : t.accentSecondary || t.accent;
  el.textContent = `
    [data-theme]:not([data-night="true"]) {
      --orb1: ${t.orb1} !important;
      --orb2: ${t.orb2} !important;
      --orb3: ${t.orb3} !important;
      --mood-accent: ${t.accent} !important;
      --mood-color: ${t.accent} !important;
      --accent: ${t.accent} !important;
      ${t.bg ? `--bg-app: ${t.bg} !important;` : ""}
      --accent-secondary: ${accentSec} !important;
      --accent-dim: ${t.accentDim} !important;
      --accent-glow: ${t.accentGlow} !important;
      --cue-bar: ${t.accentDim.replace(/[\d.]+\)$/, "0.7)")} !important;
      --cue-bar-label: ${t.accentDim.replace(/[\d.]+\)$/, "0.9)")} !important;
      ${t.textPrimary ? `--text-white: ${t.textPrimary} !important;` : ""}
      ${t.accentBtnText ? `--accent-btn-text: ${t.accentBtnText} !important;` : ""}
      ${t.tabBg ? `--tab-bg: ${t.tabBg} !important;` : ""}
    }
    @media (prefers-reduced-motion: no-preference) {
      .app-orbs { transition: background var(--motion-slow) !important; }
    }
  `;
  return { bg: t.bg };
}

// Error capture helper — records errors and promise rejections to localStorage.
// Useful for opaque "Script error" on iOS/Safari; reproduce the issue and then
// check localStorage.getItem('axis_errors') in Safari Web Inspector.
(function installAxisErrorCapture() {
  try {
    function saveRecord(rec) {
      try {
        const existing = JSON.parse(localStorage.getItem('axis_errors') || '[]');
        existing.push(rec);
        // keep last 30
        localStorage.setItem('axis_errors', JSON.stringify(existing.slice(-30)));
        // also expose the last error for quick inspection
        window.__axis_last_error = rec;
      } catch (e) {/* swallow */}
    }

    window.addEventListener('error', function (ev) {
      try {
        const rec = {
          type: 'error',
          message: ev.message || String(ev.error || ev),
          filename: ev.filename || null,
          lineno: ev.lineno || null,
          colno: ev.colno || null,
          stack: ev.error && ev.error.stack ? ev.error.stack : ev.error && ev.error.toString ? ev.error.toString() : null,
          time: new Date().toISOString()
        };
        saveRecord(rec);
      } catch (e) {}
    }, { passive: true });

    window.addEventListener('unhandledrejection', function (ev) {
      try {
        const reason = ev.reason;
        const rec = {
          type: 'unhandledrejection',
          message: reason && reason.message ? reason.message : String(reason),
          stack: reason && reason.stack ? reason.stack : null,
          time: new Date().toISOString()
        };
        saveRecord(rec);
      } catch (e) {}
    }, { passive: true });
  } catch (e) {}
})();

  /* AXIS design tokens — foundation */

  /* Ensure app icons use currentColor */
  .app svg { stroke: currentColor !important; fill: none !important; }

  .exercise-figure--catcow svg,

  .app .fv-cta svg,

  /* Enforce consistent onboarding sizes (override inline styles if present) */

  .app .app-label,

  /* App-shell scrolling: single scroll container for native iOS feel */
  .app { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  .app-body, .app-shell, .app-content { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; touch-action: pan-y; -webkit-overflow-scrolling: touch; }
  /* Root scroll: smooth iOS momentum + avoid scroll chaining fights with nested strips */
  .axis-app-scroll-root {

  .content.content--session {

  /* LIST + GUIDED: breathing room above tab bar for primary CTAs */
  .session-cta-pad { margin-bottom: var(--axis-safe-bottom); padding-bottom: 12px; }
  .session-cta-pad--guided { margin-bottom: 0; padding-bottom: 0; }
  .session-guided-preview {

  }
  .sg {

    background:var(--glass-bg);
    backdrop-filter:blur(24px) saturate(1.8); -webkit-backdrop-filter:blur(24px) saturate(1.8);
    border:1px solid var(--glass-border);
    border-radius:22px;
    padding:16px;
    box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-specular);
  }
  .sh { display:flex; align-items:baseline; gap:8px; padding-bottom:16px; border-bottom:1px solid var(--border); margin-bottom:8px; }
  .sh-tag { font-size: var(--text-xs); font-family:var(--font-display); font-weight:500; color:var(--text-dimmer); letter-spacing:0.12em; text-transform:uppercase; }
  .sh-name { font-size: var(--text-lg); font-weight: 600; font-family:var(--font-display); letter-spacing:0.08em; text-transform:uppercase; color:var(--text-secondary); }
  .sh-ct { margin-left:auto; font-size: var(--text-xs); font-family:var(--font-display); font-weight:500; color:var(--text-dimmer); letter-spacing:0.06em; }

  /* ── PURPOSE NOTE ── */
  .purpose-note {
    margin-top:8px; margin-bottom:8px; padding:10px 0;
    border-top:1px solid var(--border); border-bottom:1px solid var(--border);
  }
  .purpose-label { font-size: var(--text-xs); font-family:var(--font-display); font-weight:500; letter-spacing:0.2em; text-transform:uppercase; color:var(--accent-secondary); margin-bottom:8px; }

  /* ── EXERCISE ROW ── */
  .er-card { border-bottom:1px solid var(--border); transition:all 0.2s; position:relative; }
  .er { display:flex; align-items:center; gap:12px; padding:13px 0; margin:0; cursor:pointer; transition:all 0.2s; position:relative; border-radius:0; }
  .er-card:hover { background:var(--bg-hover); border-bottom-color:transparent; border-radius:10px; margin:0; padding:0; }
  .er.open {
    background:transparent; border:none;
    border-radius:12px 12px 0 0; border-bottom-color:transparent;
    box-shadow:none;
    backdrop-filter:none; -webkit-backdrop-filter:none;
    margin:6px 0 0; padding:13px 0;
  }
  /* Expanded row: same horizontal band as .cue-tiers (title, actions, chevron align with instructions) */
  .er-card.er-card--open .er.open {
    padding-top: 13px;
    padding-bottom: 13px;
    padding-inline: var(--er-panel-pad-start) var(--er-panel-pad-end);
    box-sizing: border-box;
  }
  .panel {
    background:var(--glass-bg); border:1px solid var(--glass-border-strong); border-top:none;
    border-radius:0 0 12px 12px; padding:16px;
    margin:0 0 8px;

    box-shadow:0 4px 20px rgba(60,80,150,0.10), inset 0 -1px 0 var(--glass-specular);
  }
  .er-card.er-card--open {
    margin:6px 0 8px;
    padding:0 0 8px;
    background:var(--glass-bg);
    border:1px solid var(--glass-border-strong);
    border-radius:12px;
    backdrop-filter:blur(24px) saturate(1.4);
    -webkit-backdrop-filter:blur(24px) saturate(1.4);
    box-shadow:0 8px 28px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  .er-card.er-card--open .panel {
    background: transparent;
    border: none;
    border-top: none;
    box-shadow: none;
    margin: 0;
    padding: 10px 0 0;
    border-radius: 0;
    backdrop-filter:none;
    -webkit-backdrop-filter:none;
  }
  /* Unified Liquid Glass — major cards (Home + Protocol) */
  .session-card.track-card {
    transition: background var(--motion-slow), border-color var(--motion-slow), box-shadow var(--motion-slow), transform var(--motion-slow);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01)), rgba(0, 0, 0, 0.1);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35), 0 16px 40px rgba(0,0,0,0.04), var(--glass-shadow);
  }
  .app[data-theme="light"]:not([data-night="true"]) .session-card.track-card {
    border-color: rgba(0, 0, 0, 0.1);
  }
  .session-card.track-card::before {
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.14) 35%, rgba(255, 255, 255, 0.22) 50%, rgba(255, 255, 255, 0.14) 65%, transparent);
  }
  .session-card.track-card:hover {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015)), rgba(0, 0, 0, 0.12);
  }
  .protocol-panel.panel {
    transition: background var(--motion-slow), border-color var(--motion-slow), box-shadow var(--motion-slow);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: none;
    border-top: 1px solid rgba(255, 255, 255, 0.14);
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01)), rgba(0, 0, 0, 0.1);
    box-shadow: 0 8px 28px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255, 255, 255, 0.35);
  }
  .today-card {
    position:relative;
    overflow:hidden;
    isolation: isolate;
    transition: background var(--motion-slow), border-color var(--motion-slow), box-shadow var(--motion-slow), transform var(--motion-slow), backdrop-filter var(--motion-slow), -webkit-backdrop-filter var(--motion-slow);
  }
  .today-card--ghost {
    box-sizing:border-box;
  }
  /* Today hero + Recents: press feedback (edge-to-edge scale + brief veil) */
  .home .start-here-group.today-card.today-card--ghost {
    touch-action: manipulation;
    transition: transform 0.2s cubic-bezier(0.34, 1.3, 0.64, 1), background var(--motion-slow), border-color var(--motion-slow), box-shadow var(--motion-slow), backdrop-filter var(--motion-slow), -webkit-backdrop-filter var(--motion-slow);
  }
  .home .start-here-group.today-card.today-card--ghost::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: rgba(255, 255, 255, 0.08);
    opacity: 0;
    transition: opacity 0.15s ease;
    pointer-events: none;
    z-index: 1;
  }
  .home .start-here-group.today-card.today-card--ghost > * {
    position: relative;
    z-index: 2;
  }
  .home .start-here-group.today-card.today-card--ghost:active {
    transform: scale(0.98);
  }
  .home .start-here-group.today-card.today-card--ghost:active::after {
    opacity: 1;
  }
  .panel:focus { outline: none; }
  .panel:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  [data-theme="dark"] .panel {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01)), rgba(0,0,0,0.1);
    box-shadow:0 8px 28px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  [data-theme="light"] .panel {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)), rgba(255,255,255,0.02);
    box-shadow:0 8px 24px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.55);
  }
  .reps-row { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-top:8px; border-top:1px solid var(--border); padding-top:14px; flex-wrap:nowrap; }
  .reps-left { display:flex; flex-direction:column; flex:1; min-width:0; }
  .mark-btn {
    width:100%; padding:12px; border-radius:12px; cursor:pointer; transition:all 0.2s; margin-top:8px;
    background:var(--glass-bg); border:1px solid var(--glass-border-strong); color:var(--text-primary);
    font-family:var(--font-display); font-size: var(--text-base); font-weight:600; letter-spacing:0.18em; text-transform:uppercase;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }
  .mark-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  .chk {
    width:26px; height:26px; flex-shrink:0; border-radius:50%; cursor:pointer;
    border:1.5px solid var(--glass-border-strong); background:var(--glass-bg);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center; transition:all 0.2s;
  }
  .chk.on { border-color:var(--accent); background:var(--accent); box-shadow:0 0 12px var(--accent-glow); }
  .chk svg { opacity:0; transition:opacity 0.15s; }
  .chk.on svg { opacity:1; }
  .ei { flex:1; min-width:0; }
  .en { font-size: var(--text-lg); font-weight:600; color:var(--text-primary); letter-spacing:-0.01em; transition:all 0.2s; }
  .er.open .en { color:var(--text-white); font-weight: 600; }
  .en.done { color:var(--text-done); text-decoration:line-through; }
  .en.skipped { color:var(--text-done); text-decoration:line-through; }
  .es { margin-top:4px; }

  .ereps { font-size: var(--text-sm); font-weight:500; font-family:var(--font-display); color:var(--text-secondary); letter-spacing:0.08em; margin-top:8px; text-transform:uppercase; }
  .npill {
    font-family:var(--font-display); font-weight:500; font-size: var(--text-sm); letter-spacing:0.16em; text-transform:uppercase; padding:2px 9px; border-radius:20px;
    background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--text-secondary);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .chev { color:var(--text-dim); font-size: var(--text-sm); transition:transform 0.25s; align-self:center; }
  .chev.op { transform:rotate(180deg); }
  .row-actions { display:flex; gap:4px; flex-shrink:0; align-self:center; }
  .ra-btn {
    min-width:44px; min-height:44px; border-radius:999px; border:1px solid var(--glass-border);
    padding:12px;
    background:var(--glass-bg); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    font-size: var(--text-sm); font-weight:600; line-height:1; transition:background 0.15s, border-color 0.15s, color 0.15s, transform var(--motion-fast), opacity var(--motion-fast); color:var(--text-dim);
    box-sizing:border-box; -webkit-tap-highlight-color: transparent;
  }
  .ra-btn:hover { background:var(--glass-bg-hover); border-color:var(--glass-border-strong); color:var(--text-primary); }
  .ra-btn:active { transform: scale(0.97); opacity: 0.9; }
  .ra-btn.fav-on { color:var(--accent); border-color:var(--accent); background:var(--accent-dim); }

  /* ── GUIDED CARD ── */
  .fc {
    margin-top:16px; padding:16px; border-radius:20px; position:relative; overflow:hidden;
    background:var(--glass-bg); backdrop-filter:blur(24px) saturate(1.8); -webkit-backdrop-filter:blur(24px) saturate(1.8);
    border:1px solid var(--glass-border); box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-specular);
  }
  .fc::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px; pointer-events:none;
    background:linear-gradient(90deg, transparent, var(--glass-specular) 30%, rgba(255,255,255,0.22) 50%, var(--glass-specular) 70%, transparent);
  }
  .fc-idx { position:absolute; top:14px; right:16px; font-size: var(--text-sm); color:var(--text-dimmer); letter-spacing:0.12em; }
  .fc-name { font-size: var(--text-xl); font-weight: 600; letter-spacing:-0.03em; line-height:1.15; margin:4px 0 6px; color:var(--text-white); }
  .fc-sub { margin-bottom:16px; }
  .fc-steps { display:flex; flex-direction:column; gap:0; border-top:1px solid var(--border); padding-top:18px; margin-bottom:18px; padding-left:0; padding-right:0; box-sizing:border-box; }
  .fc-step { display:flex; gap:0; position:relative; }
  .fc-step:not(:last-child)::after { content:''; position:absolute; left:21px; top:42px; bottom:0; width:1px; background:var(--step-connector); display:none; }
  .fc-badge { display:none;
    width:42px; height:42px; flex-shrink:0; border-radius:12px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)), var(--glass-bg);
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(12px) saturate(1.25);
    -webkit-backdrop-filter: blur(12px) saturate(1.25);
    box-shadow: 0 0 14px color-mix(in srgb, var(--accent) 22%, transparent), 0 0 6px color-mix(in srgb, var(--mood-accent) 18%, transparent), inset 0 1px 0 rgba(255, 255, 255, 0.14);
    display:flex; align-items:center; justify-content:center;
  }
  .fc-pos { font-size: var(--text-base); font-weight:600; color:var(--accent-secondary); }
  .fc-right { padding:0 0 35px 14px; flex:1; text-align:left; }
  .fc-plabel { font-size: var(--text-sm); font-family:var(--font-display); font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-secondary); margin-bottom:4px; }
  .fc-pfocus {
    display:inline-block; font-size: calc(var(--text-sm) + 2px); letter-spacing:0.16em; border-radius:20px; text-align:left; text-transform:uppercase;
    color:var(--accent-secondary); background:var(--accent-dim); border:1px solid rgba(255,191,101,0.18);
    padding:1px 9px; margin-bottom:6px;
  }
  [data-night="true"] .step-focus,
  [data-night="true"] .fc-pfocus {
    color: #FF3B30 !important;
    -webkit-text-fill-color: #FF3B30 !important;
  }
  .fc-timer { border-top:1px solid var(--border); padding-top:16px; margin-bottom:14px; }
  .fc-reps { border-top:1px solid var(--border); padding-top:14px; margin-bottom:14px; }
  /* flow fullscreen overlay */
  .fv-overlay {
    position:fixed; inset:0; z-index:500;
    background:var(--bg-gradient);
    display:flex; flex-direction:column;
  }
  .fv-top-bar {
    display:flex; align-items:center; justify-content:space-between;
    padding:calc(env(safe-area-inset-top, 0px) + 52px) var(--page-gutter) 16px; flex-shrink:0;
  }
  .fv-top-exit {
    background:none; border:none; cursor:pointer; padding:12px;
    color:var(--text-secondary); font-family:var(--font-display);
    font-size: var(--text-sm); letter-spacing:0.16em; text-transform:uppercase;
    min-height:44px; display:inline-flex; align-items:center; box-sizing:border-box;
    transition: color 0.15s, transform var(--motion-fast), opacity var(--motion-fast);
    -webkit-tap-highlight-color: transparent;
  }
  .fv-top-exit:active { transform: scale(0.97); opacity: 0.88; }
  .fv-top-meta { text-align:right; }
  .fv-top-section { font-size: var(--text-sm); letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dimmer); }
  .fv-top-prog { font-size: var(--text-xs); color:var(--text-secondary); margin-top:2px; }
  /* main card */
  .fv-main {
    flex:1; display:flex; flex-direction:column; justify-content:space-between;
    margin:0 16px; padding:32px 28px 28px; border-radius:28px; overflow:hidden;
    background:var(--glass-bg); border:1px solid var(--glass-border);
    box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-specular);
  }
  .fv-name { font-size: 40px; font-weight: 600; letter-spacing:-0.03em; line-height:1.1; color:var(--text-white); margin-bottom:16px; }
  .fv-cue { font-size: var(--text-lg); }
  .fv-bottom { display:flex; flex-direction:column; gap:12px; }
  .fv-next { font-size: var(--text-sm); color:var(--text-dim); letter-spacing:0.10em; text-transform:uppercase; }
  .fv-next span { color:var(--text-secondary); font-style:italic; letter-spacing:0; text-transform:none; }
  /* action bar */
  .fv-bar {
    display:flex; gap:10px; padding:14px 16px calc(env(safe-area-inset-bottom,0px) + 20px); flex-shrink:0;
  }
  .fv-cta {
    width:100%; padding:16px 24px; border-radius:20px; cursor:pointer; transition:all 0.18s; border:none;
    background:var(--accent); color:var(--accent-btn-text);

  }

  .fv-cta:active { transform:scale(0.97); opacity:0.85; }
  .fv-cta.done { background:var(--accent-dim); border:1px solid var(--accent); color:var(--accent); }

  }
  .fv-skip {

    background:var(--glass-bg); border:1px solid var(--glass-border-strong); color:var(--text-secondary);
    font-family:var(--font-display); font-size: var(--text-base); font-weight: 600; letter-spacing:0.14em; text-transform:uppercase;
    box-shadow:0 1px 4px rgba(0,0,0,0.12); display:inline-flex; align-items:center; justify-content:center; box-sizing:border-box;

  .fv-prev {

    transition:background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s, transform var(--motion-fast), opacity var(--motion-fast);
    background:var(--glass-bg); border:1px solid var(--glass-border-strong); color:var(--text-secondary);
    font-family:var(--font-display); font-size: var(--text-lg); line-height:1;
    box-shadow:0 1px 4px rgba(0,0,0,0.12); display:inline-flex; align-items:center; justify-content:center; box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
  }
  .fv-prev:active { transform: scale(0.97); opacity: 0.9; }
  .fv-prev:disabled { opacity:0.2; cursor:not-allowed; }

  /* ── STEPS (A/B/C cues) — horizontal inset on .cue-tiers so dividers/text share one box (LIST/GUIDED) ── */
  .steps {
    display:flex; flex-direction:column; gap:0; margin-top:8px;
    padding-left:0; padding-right:0;
    box-sizing:border-box;
  }
  .er-card.er-card--open .protocol-panel.panel .steps {
    padding-left:0;
    padding-right:0;
  }
  .content--session .protocol-panel.panel .steps > .cue-tiers,
  .protocol-panel.panel .steps > .cue-tiers,
  .fc-steps > .cue-tiers {
    padding-inline: var(--er-panel-pad-start) var(--er-panel-pad-end);
    box-sizing: border-box;
    width: 100%;

    bottom: 3px;

    font-size: var(--text-sm);
    font-weight: 800;

  .summary-momentum .momentum-cell:not(.momentum-cell--on) .momentum-cell__dow {

  }
  .summary-momentum .momentum-cell--on .momentum-cell__dow {
    color: #252525;
    -webkit-text-fill-color: #252525;
  }
  /* Ultra: filled momentum square — weekday letter on red uses true black (beats .content * red) */
  .app[data-night="true"] .summary-momentum .momentum-cell--on .momentum-cell__dow {
    color: #000000 !important;
    -webkit-text-fill-color: #000000 !important;
  }
  .app[data-night="true"] .summary-momentum .momentum-cell:not(.momentum-cell--on) .momentum-cell__dow {
    color: rgba(255, 59, 48, 0.55) !important;
    -webkit-text-fill-color: rgba(255, 59, 48, 0.55) !important;
  }
  .momentum-labels { display:flex; justify-content:space-between; margin-bottom:6px; padding: 0; width: 100%; box-sizing: border-box; }
  .momentum-label { font-size: var(--text-xs); letter-spacing:0.10em; text-transform:uppercase; color:var(--text-dimmer); }
  .app[data-theme="light"]:not([data-night="true"]) .momentum-label { color: var(--text-dim); }
  .momentum-disclaimer { font-size: var(--text-xs); color:var(--text-dimmer); letter-spacing:0.04em; line-height:1.35; text-align: left; }
  .summary-goal-footnote {
    font-size: var(--text-xs);
    color: var(--text-dimmer);
    letter-spacing: 0.04em;
    line-height: 1.35;
    text-align: left;
    margin-top: 8px;
  }
  .summary-goal-link {
    background:none;
    border:none;
    padding:0;
    margin:0;
    cursor:pointer;
    color:inherit;
    font:inherit;
    display:inline-flex;
    align-items:baseline;
    gap:4px;
  }
  .summary-goal-link .summary-hero-metric-num,
  .summary-goal-link .summary-hero-metric-unit {
    color: var(--accent);
  }

  /* ── DONE BANNER ── */
  .done-banner {
    padding:36px 22px; text-align:center; margin-top:24px; border-radius:22px;
    background:var(--glass-bg); border:1px solid var(--glass-border);
    backdrop-filter:blur(24px) saturate(1.4); -webkit-backdrop-filter:blur(24px) saturate(1.4);
    box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-specular);
  }
  .db-title { font-size: var(--text-lg); font-weight: 600; letter-spacing:-0.03em; margin-bottom:5px; color:var(--text-white); }
  .db-sub { font-size: var(--text-sm); color:var(--text-secondary); letter-spacing:0.14em; text-transform:uppercase; }
  .reset-lnk { display:block; width:fit-content; margin:20px auto 0; background:none; border:none; font-family:var(--font-display); font-size: var(--text-sm); letter-spacing:0.16em; text-transform:uppercase; color:var(--text-dim); cursor:pointer; text-decoration:underline; text-underline-offset:3px; transition:color 0.15s; }
  .reset-lnk:hover { color:var(--text-secondary); }

  /* ── FAV FILTER (iPhone: single row, tight pills) ── */
  .fav-filter {
    display:flex; flex-direction:row; flex-wrap:nowrap; align-items:center; justify-content:flex-start; gap:8px;
    margin:14px 0;
    padding:0; position:relative;
    overflow: visible; -webkit-overflow-scrolling:touch;
    scrollbar-width:none; -ms-overflow-style:none;
    visibility: visible;
    opacity: 1;
    min-height: 28px;
  }
  .fav-filter.fav-filter--after-guided-cta { margin:14px 0 !important; }
  /* Ensure the first section after pills has no extra top margin to keep vertical spacing even */
  .fav-filter + .sg { margin-top: 0 !important; }

  /* Sessions: same horizontal inset as .tab-subbar (--page-gutter) — matches full-width .fv-cta / list CTA edges */
  .fav-filter.fav-filter--session-util {
    display: flex !important;
    flex-direction: row;
    flex-wrap: nowrap;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    box-sizing: border-box;
    margin: 16px 0 10px;
    padding: 0;
    gap: 0;
    min-height: 32px;
    visibility: visible;
    opacity: 1;
  }
  .app[data-theme="light"]:not([data-night="true"]) .fav-filter.fav-filter--session-util {
    margin-top: 12px;
    padding-top: 14px;
    border-top: 1px solid rgba(15, 30, 46, 0.09);
  }
  .fav-filter.fav-filter--session-util .fav-filter__cluster--left {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    align-items: center;
    gap: 8px;
    flex: 0 1 auto;
    min-width: 0;
  }
  .fav-filter.fav-filter--session-util .fav-toggle__icon {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    display: block;
  }
  /* Same size/color as header tab subtitle (“Step-by-step walkthrough.”): var(--text-xs) + var(--text-dimmer) */
  .fav-filter.fav-filter--session-util .fav-toggle {
    flex: 0 0 auto;
    min-height: 28px;
    height: 28px;
    padding: 0 8px !important;
    border-radius: 999px !important;
    font-family: var(--font-display) !important;
    font-size: 9.5pt !important;
    font-weight: 500 !important;
    line-height: 1 !important;
    letter-spacing: 0.06em !important;
    text-transform: uppercase !important;
    border: 1px solid color-mix(in srgb, var(--text-primary) 15%, transparent) !important;
    background: transparent !important;
    color: var(--text-dimmer) !important;
    box-sizing: border-box !important;
    box-shadow: none !important;
    gap: 4px;
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
  }
  .fav-filter.fav-filter--session-util .fav-toggle:hover {
    border-color: color-mix(in srgb, var(--text-primary) 28%, transparent) !important;
    color: var(--text-secondary) !important;
    background: transparent !important;
    box-shadow: none !important;
  }
  .fav-filter.fav-filter--session-util .fav-toggle.on {
    border-color: color-mix(in srgb, var(--text-primary) 35%, transparent) !important;
    background: transparent !important;
    color: var(--text-secondary) !important;
    box-shadow: none !important;
  }
  .fav-filter.fav-filter--session-util .fav-toggle.reset-pill {
    color: var(--text-dimmer) !important;
    flex-shrink: 0;
  }
  .fav-filter.fav-filter--session-util .fav-toggle.reset-pill:hover {
    border-color: color-mix(in srgb, var(--text-primary) 28%, transparent) !important;
    color: var(--text-secondary) !important;
    background: transparent !important;
    box-shadow: none !important;
  }
  /* Session row (Favorites / Skipped / Reset) — light: stronger default vs “on” */
  .app[data-theme="light"]:not([data-night="true"]) .fav-filter.fav-filter--session-util .fav-toggle {
    color: rgba(15,30,46,0.74) !important;
    border-color: rgba(15,30,46,0.228) !important;
  }
  .app[data-theme="light"]:not([data-night="true"]) .fav-filter.fav-filter--session-util .fav-toggle:hover {
    color: rgba(15,30,46,0.87) !important;
    border-color: rgba(15,30,46,0.323) !important;
  }
  .app[data-theme="light"]:not([data-night="true"]) .fav-filter.fav-filter--session-util .fav-toggle.on {
    color: rgba(15,30,46,0.98) !important;
    border-color: color-mix(in srgb, var(--accent) 55%, rgba(15,30,46,0.22)) !important;
    background: color-mix(in srgb, var(--accent) 16%, rgba(255,255,255,0.98)) !important;
    font-weight: 600 !important;
  }
  .app[data-theme="light"]:not([data-night="true"]) .fav-filter.fav-filter--session-util .fav-toggle.reset-pill {
    color: rgba(15,30,46,0.74) !important;
  }
  .app[data-theme="light"]:not([data-night="true"]) .fav-filter.fav-filter--session-util .fav-toggle.reset-pill:hover {
    color: rgba(15,30,46,0.87) !important;
  }

  .reset-pill { margin-left:auto; }
  .fav-filter.fav-filter--session-util .reset-pill { margin-left: 0; }
  .fav-filter::before {
    display:none;
  }
  .fav-toggle {
    flex:0 0 auto; min-height:0; padding:6px 14px !important; border-radius:20px;
    font-family:'Barlow', sans-serif !important; font-size:12px !important; font-weight:500 !important;
    line-height:1 !important; letter-spacing:0.08em; text-transform:uppercase !important;
    cursor:pointer; transition:border-color 0.18s, background 0.18s, color 0.18s, transform var(--motion-fast), opacity var(--motion-fast); white-space:nowrap;
    border:1px solid var(--glass-border); background:transparent; color:var(--text-dim);
    box-sizing:border-box; display:inline-flex; flex-direction:row; align-items:center; justify-content:center; -webkit-tap-highlight-color: transparent;
    gap: 6px;
  }
  .fav-toggle span { 
    display: inline-flex; align-items: center; justify-content: center; 
    line-height: 0; height: 12px; width: 12px; font-size: 14px; 
    position: relative; top: -0.5px; /* Fine-tuned optical centering */
  }
  /* Hairline borders for interaction pills (non–session-util rows only) */
  [data-theme="dark"] .fav-filter:not(.fav-filter--session-util) .fav-toggle { border-color: rgba(255, 255, 255, 0.2); }
  [data-theme="light"] .fav-filter:not(.fav-filter--session-util) .fav-toggle { border-color: rgba(0, 0, 0, 0.1); }
  /* Keep single-line pills on iPhone widths by reducing tracking instead of wrapping */
  @media (max-width: 420px) {
    .fav-toggle { letter-spacing: 0.10em; }
  }
  @media (max-width: 380px) {
    .fav-toggle { letter-spacing: 0.08em; }
  }
  .fav-toggle:hover { border-color:var(--accent); color:var(--accent); }
  .fav-toggle:active { transform: scale(0.98); opacity: 0.92; }
  .fav-toggle.on { border-color:var(--accent); background:var(--accent-dim); color:var(--accent); }
  .fav-toggle.reset-pill { border-style:solid; color:var(--text-dim); }
  .fav-toggle.reset-pill:hover { border-color:var(--text-secondary); color:var(--text-secondary); }

  /* ── NOTES ── */
  .notes-area { margin-top:10px; }
  .notes-input {
    width:100%; padding:10px 14px; font-family:var(--font-display); font-size: var(--text-sm); border-radius:12px;
    background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--text-primary);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    resize:none; line-height:1.45; outline:none; transition:all 0.2s;
  }
  .notes-input:focus { border-color:var(--glass-border-strong); background:var(--glass-bg-hover); }
  .notes-input::placeholder { color:var(--text-dim); }

  /* ── TAB BAR ── */
  .tab-bar {
    position:fixed; bottom:0; left:0; right:0;
    min-height: var(--axis-tab-h);
    background: var(--tab-bg);
    backdrop-filter: blur(25px) saturate(1.35); -webkit-backdrop-filter: blur(25px) saturate(1.35);
    border-top: 1px solid var(--border);
    display:flex; align-items:center; justify-content:space-around;
    padding: 6px 8px calc(12px + env(safe-area-inset-bottom,0px));
    z-index:300;
    box-sizing:border-box;
  }
  .tab-btn {
    display:flex; flex-direction: column; align-items:center; justify-content:center;
    gap:0;
    min-width:48px; min-height:48px; width:auto; height:auto;
    padding:0; border:none; cursor:pointer; border-radius:999px;
    background:transparent; color: rgba(225,236,252,0.68);
    transition:color 0.15s, transform var(--motion-fast), opacity var(--motion-fast); position:relative; flex:0 0 auto;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn-stack {
    --tab-icon-size: 30px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    flex-shrink:0;
  }
  .tab-btn:not(.active) .nav-tab-indicator {
    pointer-events: none;
  }
  .tab-btn:active { transform: scale(0.95); opacity: 0.88; }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn { color: color-mix(in srgb, var(--axis-black) 34%, transparent); }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn.active { color: #1D1D1F; }

  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn { color: color-mix(in srgb, var(--axis-white) 25%, transparent); }
  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn.active { color: #D1D5DB; }

  .tab-bar[data-night="false"][data-theme="light"] .tab-btn:hover:not(.active) { color: color-mix(in srgb, var(--axis-black) 47%, transparent); }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn.active:hover { color: #1D1D1F; }

  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn:hover { color: color-mix(in srgb, var(--axis-white) 25%, transparent); }
  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn.active:hover { color: var(--axis-white); }
  .tab-icon-shell {
    position:relative; display:flex; align-items:center; justify-content:center;
    width:var(--tab-icon-size, 30px); height:var(--tab-icon-size, 30px);
  }
  .tab-btn svg {
    stroke: currentColor;
    fill: none;
    transition: color 0.15s, opacity 0.15s, stroke-width 0.15s;
    width: var(--tab-icon-size, 30px);
    height: var(--tab-icon-size, 30px);
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 1;
  }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn:not(.active) svg {
    stroke-width: 1.45;
    opacity: 0.79;
  }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn.active svg {
    stroke-width: 2.05;
    opacity: 1;
  }
  .tab-btn.active .tab-icon-shell::before { content:none; }
  /* No legacy glow/dot under icons — only .nav-tab-indicator above (all themes) */
  .tab-bar .tab-btn .tab-icon-shell::before,
  .tab-bar .tab-btn .tab-icon-shell::after {
    content: none !important;
    display: none !important;
    border: none !important;
    box-shadow: none !important;
    background: none !important;
  }
  .tab-btn .tab-icon-shell svg { position:relative; z-index:1; }
  /* Pill above icon: 20% wider than icon, 4px gap to icon (tab-btn-stack gap), capsule ends */
  .nav-tab-indicator {
    box-sizing: border-box;
    width: calc(var(--tab-icon-size, 30px) * 1.2);
    height: 3px;
    min-height: 3px;
    border-radius: 9999px;
    margin: 0;
    align-self: center;
    flex-shrink: 0;
    background: transparent;
    opacity: 0;
    transform: none;
    transition: opacity 0.18s ease, background 0.18s ease;
  }
  .tab-btn.active .nav-tab-indicator {
    opacity: 1;
    background: var(--mood-accent);
    box-shadow: none;
  }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn.active .nav-tab-indicator {
    background: var(--accent);
    opacity: 1;
  }
  .tab-bar-spacer {
    height: calc(var(--axis-bottom-content-inset) + var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 56px);
  }

  /* TODAY (solid highlight) sometimes needs extra breathing room */
  .tab-bar-spacer--today {
    height: calc(var(--axis-bottom-content-inset) + var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 140px);
  }

  /* Active SESSION (LIST / GUIDED / SUMMARY): tight tail above tab bar — no duplicate --axis-bottom-content-inset + 56px stack */
  .tab-bar-spacer--session {
    height: calc(var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 12px);
    min-height: 0;
  }
  .tab-bar-spacer--summary {
    height: calc(var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 4px);
    min-height: 0;
  }
  .tab-bar-spacer--settings {
    height: calc(var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 8px);
    min-height: 0;
  }

  /* Light mode: distinct tab strip + separation from page (Safari frosted read) — not in AXIS Ultra */
  .tab-bar[data-theme="light"]:not([data-night="true"]) {
    background: #f6f7f8;
    border-top: 1px solid rgba(37, 37, 37, 0.1);
    box-shadow: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }

  /* Light: top dashboard strip — solid #f6f7f8; inactive chrome #E0E0E0; mood accent fills */
  .app[data-theme="light"]:not([data-night="true"]) .dashboard-header {
    background: #f6f7f8 !important;
    border-bottom: 1px solid rgba(37, 37, 37, 0.1);
    box-shadow: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }

  /* MOOD: avoid stacking full tab-bar-spacer + large list padding (was ~1/4 screen gap). Spacer collapsed; padding carries clearance. */
  .app--nav-gap-tight .tab-bar-spacer--mood {
    height: 0 !important;
    min-height: 0 !important;
    margin: 0 !important;
    padding: 0 !important;
    overflow: hidden;
    pointer-events: none;
  }

  /* One rhythm for Rest→Night and breathing room above tab (no extra row margin) */
  .app--nav-gap-tight .app-body--list-pad {
    padding-bottom: calc(var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) - 16px);
  }

  /* ── HOME ── */
  .home { min-height:100vh; position:relative; z-index:1; }
  .home-hdr { padding: var(--safe-top) var(--page-padding) 0; max-width:100%; }
  .home-wordmark {
    font-size: var(--text-xl); font-weight:600; letter-spacing:0.10em; text-transform:uppercase; font-family: var(--font-display);
    color:var(--text-white); line-height:1; margin-bottom:0;
  }
  .home-eyebrow { display:none; }
  .home-brand { display:flex; flex-direction:column; align-items:flex-start; gap:0; }
  .home-brand-icon { display:none; }
  .home-tagline {
    font-size: var(--text-lg); color:var(--text-white); font-weight:400; font-style:normal;
    padding:18px 0 24px; letter-spacing:-0.01em; max-width:100%; display:block;
    line-height:1.25; text-align:left; margin:0;
  }
  /* End-of-list marker */
  .home .eol-marker {
    padding-left:var(--page-gutter);
    padding-right:var(--page-gutter);
    box-sizing:border-box;
  }
  .eol-marker {
    display:flex; align-items:center; justify-content:center;
    min-height:92px;
    padding-top:40px;
    padding-bottom:calc(84px + env(safe-area-inset-bottom, 0px));
    margin-bottom:0;
    --eol-lift: 28px;
    user-select:none; -webkit-user-select:none;
    position:relative; cursor:default; width:100%;
    max-width:100%; overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch;
    box-sizing:border-box;
  }
  .eol-xs {
    font-size: var(--text-xs); letter-spacing:0.8em; font-weight: 400;
    color:var(--eol-color);
    transition:opacity 0.4s ease;
    text-align:center;
    line-height:1;
    position:absolute; top:50%; left:50%; transform:translate(-50%, calc(-50% - var(--eol-lift)));
    white-space:nowrap;
  }
  .eol-tag {
    font-size: var(--text-xs); letter-spacing:0.22em; font-weight: 400;
    color:var(--eol-color);
    text-transform:uppercase;
    position:absolute; top:50%; left:50%; transform:translate(-50%, calc(-50% - var(--eol-lift)));
    opacity:0; transition:opacity 0.4s ease;
    white-space:nowrap; padding:0 12px; box-sizing:border-box;
    line-height:1;
    width:max-content; max-width:min(100vw - 48px, 100%);
  }
  .eol-marker.show-tag .eol-xs { opacity:0; }
  .eol-marker.show-tag .eol-tag { opacity:1; }

  /* ── TRACK GROUPS ── */
  .track-cards-outer { padding:0 var(--page-gutter) 24px; margin-bottom: var(--axis-safe-bottom); }
  /* Global dashboard (safe area + progress + AXIS + streak) */
  .dashboard-header {
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:130;
    padding-top:env(safe-area-inset-top, 0px);
    padding-bottom:8px;
    box-sizing:border-box;
    width:100%;
    -webkit-tap-highlight-color:transparent;
    background:var(--tab-bg);
    backdrop-filter:blur(20px) saturate(1.35);
    -webkit-backdrop-filter:blur(20px) saturate(1.35);
    border-bottom:1px solid var(--border);
  }
  .dashboard-header__row {
    display:grid;
    grid-template-columns:minmax(0, 1fr) auto minmax(0, 1fr);
    align-items:center;
    min-height:40px;
    gap:6px;
  }
  .dashboard-header__left {
    min-width:0;
    padding-left:var(--page-gutter);
    padding-right:6px;
    box-sizing:border-box;
  }
  .dashboard-header__progress-track {
    height:5px;
    border-radius:999px;
    background:#3a3a3c;
    overflow:hidden;
    width:100%;
    max-width:min(62px, 18vw); /* ~60–65px: iPhone status clock region */
  }
  .app[data-theme="light"]:not([data-night="true"]) .dashboard-header__progress-track {
    background:#9F9FA5;
  }
  .app[data-theme="light"]:not([data-night="true"]) .dashboard-header__progress-fill {
    background:var(--mood-color);
  }
  .app[data-theme="light"]:not([data-night="true"]) .dashboard-header__streak-cell--on {
    background:var(--mood-color);
  }
  .app[data-night="true"] .dashboard-header__progress-track {
    background:rgba(255, 59, 48, 0.28) !important;
  }
  .dashboard-header__progress-fill {
    height:100%;
    border-radius:inherit;
    background:var(--mood-color);
    transition:width 0.45s ease, background-color 0.45s ease, filter 0.35s ease;
    width:0%;
  }
  .dashboard-header__progress-fill.dashboard-header__progress-fill--overdrive {
    filter: drop-shadow(0 0 8px rgba(255, 165, 0, 0.6));
  }
  .dashboard-header__brand {
    font-family:var(--font-display);
    font-size:11px;
    font-weight:300;

async function bootstrapAxisApp() {
  console.log("BASE REVERT SUCCESSFUL");
  window.__AXIS_DATA_LOAD_ERROR = "";
  try {
    const res = await fetch("./axis_data.json", { cache: "no-store" });
    if (!res.ok) throw new Error("axis_data.json: HTTP " + res.status);
    const data = await res.json();
    window.AXIS_JSON = data;
    if (data && data.TRACKS && Object.keys(data.TRACKS).length) {
      TRACKS = data.TRACKS;
    } else {
      throw new Error("axis_data.json: missing TRACKS");
    }
  } catch (err) {
    console.error("AXIS: workout data load failed", err);
    TRACKS = TRACKS_DATA_FALLBACK;
    window.__AXIS_DATA_LOAD_ERROR = "Workout library could not be loaded from axis_data.json. Sessions will be empty until the file is available next to this page. (" + (err && err.message ? err.message : String(err)) + ")";
  }
  try {
    if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
      showLoadErr("App libraries did not load. Check your connection and refresh.");
      return;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  } catch (e) {
    showLoadErr("Error: " + (e && e.message ? e.message : String(e)) + (e && e.stack ? "\n\n" + e.stack : ""));
  }
}
