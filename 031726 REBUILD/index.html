function getCircadianPeriod() {
  const h = new Date().getHours();
  if (h >= 5 && h < 11) return "dawn";
  if (h >= 11 && h < 17) return "midday";
  if (h >= 17 && h < 22) return "prime";
  return "rest";
}

/** sRGB relative luminance → readable ink on solid circadian accent fills */
function inkForAccentHex(hex) {
  const m = /^#?([0-9a-f]{6})$/i.exec(String(hex || "").trim());
  if (!m) return null;
  const n = parseInt(m[1], 16);
  const rs = (n >> 16) / 255, gs = ((n >> 8) & 255) / 255, bs = (n & 255) / 255;
  const lin = (v) => v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  const L = 0.2126 * lin(rs) + 0.7152 * lin(gs) + 0.0722 * lin(bs);
  return L < 0.43 ? "var(--axis-white)" : "var(--axis-black)";
}

function applyCircadianTheme(isDark, period) {
  const p = period || getCircadianPeriod();
  const t = CIRCADIAN_THEMES[p][isDark ? "dark" : "light"];

  if (!el) {el = document.createElement("style");el.id = "circadian-style";document.head.appendChild(el);}
  // Derive cue-bar, tab-bg, and accent-secondary from accent so they always match
  const accentSec = t.accent && t.accent.match(/^#[0-9a-fA-F]{6}$/) ? t.accent + "99" : t.accentSecondary || t.accent;
  el.textContent = `
    [data-theme]:not([data-night="true"]) {
      --orb1: ${t.orb1} !important;
      --orb2: ${t.orb2} !important;
      --orb3: ${t.orb3} !important;

/** Floor Cat–Cow diagram (FIGURES[9001]). Seated Cat-Cow is a separate asset (not this key). */
function exerciseShowsCatCowFigure(id, name) {
  if (id === 1 || id === 203 || id === 703 || id === 2001) return true;
  const n = String(name || "").toLowerCase().replace(/[–—‐]/g, "-");
  if (n.includes("seated")) return false;
  return n.includes("cat") && n.includes("cow");
}
const CATCOW_FIGURE_ASSET_ID = 9001;

function catCowInstructionColor(theme, ultraNight) {
  if (ultraNight) return "#FF3B30";

}

// New Tracks: Thoracic Chest Reset Flow + Wrist & Hand Reset Flow


function getSections(trackId) {
  try {
    if (!TRACKS || !trackId || !TRACKS[trackId]) return [];
    return TRACKS[trackId].sections || [];
  } catch (e) {
    return [];
  }
}
function getAll(trackId) {
  const secs = getSections(trackId) || [];
  return secs.flatMap((s) => (s.exercises || []).map((e) => ({ ...e, sectionLabel: s.label })));
}
function exerciseSeconds(ex, fallbackSec) {
  const s = ex.seconds;
  const n = typeof s === 'number' ? s : typeof s === 'string' ? Number(s) : NaN;
  return n > 0 && Number.isFinite(n) ? n : fallbackSec || 45;
}
function exerciseSecondsFromSections(exId, sections, fallbackSec) {
  for (const sec of sections || []) {
    const ex = sec.exercises && sec.exercises.find((e) => e.id === exId || Number(e.id) === Number(exId));
    if (ex != null) {
      const s = ex.seconds;
      const n = typeof s === 'number' ? s : typeof s === 'string' ? Number(s) : NaN;
      if (n > 0 && Number.isFinite(n)) return n;
      return fallbackSec || 45;
    }
  }
  return fallbackSec || 45;
}

function storageGet(key, def) {
  try {const v = localStorage.getItem(key);return v !== null ? JSON.parse(v) : def;} catch {return def;}
}
function storageSet(key, val) {
  try {localStorage.setItem(key, JSON.stringify(val));} catch {}
}

function computeSessionSeconds(totalCount, fullSecondsFromLabel, activeCount) {
  if (totalCount > 0 && fullSecondsFromLabel > 0) {
    return Math.round(fullSecondsFromLabel * activeCount / totalCount);
  }
  return 0;
}

// Error capture helper — records errors and promise rejections to localStorage.
// Useful for opaque "Script error" on iOS/Safari; reproduce the issue and then
// check localStorage.getItem('axis_errors') in Safari Web Inspector.
(function installAxisErrorCapture() {
  try {
    function saveRecord(rec) {
      try {
        const existing = JSON.parse(localStorage.getItem('axis_errors') || '[]');
        existing.push(rec);
        // keep last 30
        localStorage.setItem('axis_errors', JSON.stringify(existing.slice(-30)));
        // also expose the last error for quick inspection
        window.__axis_last_error = rec;
      } catch (e) {/* swallow */}
    }

    window.addEventListener('error', function (ev) {
      try {
        const rec = {
          type: 'error',
          message: ev.message || String(ev.error || ev),
          filename: ev.filename || null,
          lineno: ev.lineno || null,
          colno: ev.colno || null,
          stack: ev.error && ev.error.stack ? ev.error.stack : ev.error && ev.error.toString ? ev.error.toString() : null,
          time: new Date().toISOString()
        };
        saveRecord(rec);
      } catch (e) {}
    }, { passive: true });

    window.addEventListener('unhandledrejection', function (ev) {
      try {
        const reason = ev.reason;
        const rec = {
          type: 'unhandledrejection',
          message: reason && reason.message ? reason.message : String(reason),
          stack: reason && reason.stack ? reason.stack : null,
          time: new Date().toISOString()
        };
        saveRecord(rec);
      } catch (e) {}
    }, { passive: true });
  } catch (e) {}
})();

  /* ── BASE ── */
  .app {

    [data-theme]:not([data-night="true"]) .app::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      transition: opacity var(--motion-slow);
    }
    [data-theme]:not([data-night="true"]) .app::before {
      background: var(--bg-app-a, var(--bg-app, var(--bg-gradient)));
      opacity: 1;
    }
    [data-theme]:not([data-night="true"]) .app::after {
      background: var(--bg-app-b, var(--bg-app, var(--bg-gradient)));
      opacity: 0;
    }
    html.axis-mood-xfade--b-top [data-theme]:not([data-night="true"]) .app::before {
      opacity: 0;
    }
    html.axis-mood-xfade--b-top [data-theme]:not([data-night="true"]) .app::after {
      opacity: 1;
    }
    [data-theme]:not([data-night="true"]) .tab-btn.active .tab-icon-shell::before,
    [data-theme]:not([data-night="true"]) .track-btn.active,
    [data-theme]:not([data-night="true"]) .fav-toggle.on {
      transition: background var(--motion-slow), color var(--motion-slow), border-color var(--motion-slow), box-shadow var(--motion-slow);

    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35), 0 16px 40px rgba(0,0,0,0.04), var(--glass-shadow);
  }

  .protocol-panel.panel {

  }

  }
  .panel:focus { outline: none; }

  [data-theme="dark"] .panel {

    box-shadow:0 8px 28px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.35);

  }
  .reps-row { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-top:8px; border-top:1px solid var(--border); padding-top:14px; flex-wrap:nowrap; }

  .mark-btn {

    background:var(--glass-bg); border:1px solid var(--glass-border-strong); color:var(--text-primary);

  .ra-btn {

  .ra-btn.fav-on { color:var(--accent); border-color:var(--accent); background:var(--accent-dim); }

  /* ── GUIDED CARD ── */
  .fc {

    display:flex; align-items:center; justify-content:center;

  .fc-pos { font-size: var(--text-base); font-weight:600; color:var(--accent-secondary); }
  .fc-right { padding:0 0 35px 14px; flex:1; text-align:left; }
  .fc-plabel { font-size: var(--text-sm); font-family:var(--font-display); font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-secondary); margin-bottom:4px; }
  .fc-pfocus {
    display:inline-block; font-size: calc(var(--text-sm) + 2px); letter-spacing:0.16em; border-radius:20px; text-align:left; text-transform:uppercase;
    color:var(--accent-secondary); background:var(--accent-dim); border:1px solid rgba(255,191,101,0.18);
    padding:1px 9px; margin-bottom:6px;
  }
  [data-night="true"] .step-focus,

  .fc-reps { border-top:1px solid var(--border); padding-top:14px; margin-bottom:14px; }
  /* flow fullscreen overlay */
  .fv-overlay {
    position:fixed; inset:0; z-index:500;
    background:var(--bg-gradient);
    display:flex; flex-direction:column;
  }
  .fv-top-bar {
    display:flex; align-items:center; justify-content:space-between;

  }
  .fv-top-exit {
    background:none; border:none; cursor:pointer; padding:12px;

    font-size: var(--text-sm); letter-spacing:0.16em; text-transform:uppercase;
    min-height:44px; display:inline-flex; align-items:center; box-sizing:border-box;

  }

  .fv-top-prog { font-size: var(--text-xs); color:var(--text-secondary); margin-top:2px; }
  /* main card */

  }

  .fv-cue { font-size: var(--text-lg); }
  .fv-bottom { display:flex; flex-direction:column; gap:12px; }
  .fv-next { font-size: var(--text-sm); color:var(--text-dim); letter-spacing:0.10em; text-transform:uppercase; }
  .fv-next span { color:var(--text-secondary); font-style:italic; letter-spacing:0; text-transform:none; }
  /* action bar */
  .fv-bar {
    display:flex; gap:10px; padding:14px 16px calc(env(safe-area-inset-bottom,0px) + 20px); flex-shrink:0;
  }
  .fv-cta {
    width:100%; padding:16px 24px; border-radius:20px; cursor:pointer; transition:all 0.18s; border:none;
    background:var(--accent); color:var(--accent-btn-text);
    font-family:var(--font-display); font-size: var(--text-base); font-weight:600; letter-spacing:0.16em; text-transform:uppercase;
    box-shadow:0 4px 24px var(--accent-glow);
    display:flex; flex-direction:column; align-items:center;
  }
  .fv-cta:hover { box-shadow:0 6px 32px var(--accent-glow); transform:translateY(-1px); }

  .fv-skip {

    -webkit-tap-highlight-color: transparent;

  .fv-prev {

  /* ── STEPS (A/B/C cues) ── */

  }
  /* Force-hide step number circles even if earlier rules include display:flex */

  .step-badge,

  }
  .step-pos { font-size: var(--text-sm); font-family:var(--font-display); font-weight:600; letter-spacing:0; color:var(--accent-secondary); }
  .step-right { flex:1; text-align:left; }

  .step-focus { font-size: calc(var(--text-xs) + 2px); font-family:var(--font-display); color:var(--accent-secondary); letter-spacing:0.1em; margin-top:8px; font-weight:500; text-transform:uppercase; }

  /* ── TIMER ── */
  .timer-wrap {

    border-top:1px solid var(--border);
    display:flex; flex-direction:column; gap:14px;
  }

    font-size: 48px; font-weight:600; letter-spacing:-0.02em;

  }

  .timer-next { text-align:right; }
  .timer-next-lbl { font-size: var(--text-sm); letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dim); margin-bottom:3px; }

  /* ── REPS ── */

    content:''; position:absolute; top:0; left:0; right:0; height:1px; pointer-events:none;
    background:linear-gradient(90deg, transparent, var(--glass-specular) 35%, rgba(255,255,255,0.2) 50%, var(--glass-specular) 65%, transparent);
  }
  .summary-title { font-size: var(--text-sm); letter-spacing:0.18em; text-transform:uppercase; color:var(--text-secondary); margin-bottom:14px; font-weight: 600; }
  .summary-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .summary-cell {
    background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:12px;
    padding:14px 12px; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    box-shadow:inset 0 1px 0 var(--glass-specular);
  }
  .summary-num { font-size: var(--text-xl); font-weight: 400; color:var(--accent-secondary); letter-spacing:-0.04em; line-height:1; margin-bottom:4px; }
  .summary-lbl { font-size: var(--text-sm); letter-spacing:0.14em; text-transform:uppercase; color:var(--text-secondary); }
  .history-row { display:flex; justify-content:space-between; align-items:center; padding:13px 0; border-bottom:1px solid var(--border); }
  .history-date { font-size: var(--text-xs); color:var(--text-tertiary); }
  .history-track { font-size: var(--text-sm); letter-spacing:0.10em; text-transform:uppercase; color:var(--text-secondary); }
  .history-detail { font-size: var(--text-xs); color:var(--text-dim); }

  /* Momentum 7-day strip (glass card) */
  .summary-momentum { margin-top:24px; }
  .momentum-strip { display:flex; gap:6px; margin-bottom:10px; }
  .momentum-cell { flex:1; aspect-ratio:1; border-radius:6px; transition:all 0.2s; }
  .momentum-labels { display:flex; justify-content:space-between; margin-bottom:8px; }
  .momentum-label { font-size: var(--text-xs); letter-spacing:0.14em; text-transform:uppercase; color:var(--text-dimmer); }
  .momentum-disclaimer { font-size: var(--text-xs); color:var(--text-dimmer); letter-spacing:0.06em; line-height:1.4; }

  /* ── DONE BANNER ── */
  .done-banner {
    padding:36px 22px; text-align:center; margin-top:24px; border-radius:22px;
    background:var(--glass-bg); border:1px solid var(--glass-border);
    backdrop-filter:blur(24px) saturate(1.4); -webkit-backdrop-filter:blur(24px) saturate(1.4);
    box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-specular);
  }
  .db-title { font-size: var(--text-lg); font-weight: 600; letter-spacing:-0.03em; margin-bottom:5px; color:var(--text-white); }
  .db-sub { font-size: var(--text-sm); color:var(--text-secondary); letter-spacing:0.14em; text-transform:uppercase; }
  .reset-lnk { display:block; width:fit-content; margin:20px auto 0; background:none; border:none; font-family:var(--font-display); font-size: var(--text-sm); letter-spacing:0.16em; text-transform:uppercase; color:var(--text-dim); cursor:pointer; text-decoration:underline; text-underline-offset:3px; transition:color 0.15s; }
  .reset-lnk:hover { color:var(--text-secondary); }

  /* ── FAV FILTER (iPhone: single row, tight pills) ── */
  .fav-filter {
    display:flex; flex-direction:row; flex-wrap:nowrap; align-items:center; justify-content:flex-start; gap:8px;
    margin:14px 0;
    padding:0; position:relative;
    overflow: visible; -webkit-overflow-scrolling:touch;
    scrollbar-width:none; -ms-overflow-style:none;
    visibility: visible;
    opacity: 1;
    min-height: 28px;
  }
  .fav-filter.fav-filter--after-guided-cta { margin:14px 0 !important; }
  /* Ensure the first section after pills has no extra top margin to keep vertical spacing even */
  .fav-filter + .sg { margin-top: 0 !important; }

  /* Sessions: same horizontal inset as .tab-subbar (--page-gutter) — matches full-width .fv-cta / list CTA edges */
  .fav-filter.fav-filter--session-util {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    box-sizing: border-box;
    margin: 16px 0 8px;
    padding: 0;
    gap: 0;
    min-height: 0;
  }
  .fav-filter.fav-filter--session-util .fav-filter__cluster--left {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    align-items: center;
    gap: 8px;
    flex: 0 1 auto;
    min-width: 0;
  }
  .fav-filter.fav-filter--session-util .fav-toggle__icon {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    display: block;
  }
  /* Same size/color as header tab subtitle (“Step-by-step walkthrough.”): var(--text-xs) + var(--text-dimmer) */
  .fav-filter.fav-filter--session-util .fav-toggle {
    flex: 0 0 auto;
    min-height: 28px;
    height: 28px;
    padding: 0 8px !important;
    border-radius: 999px !important;
    font-family: var(--font-display) !important;
    font-size: 9.5pt !important;
    font-weight: 500 !important;
    line-height: 1 !important;
    letter-spacing: 0.06em !important;
    text-transform: uppercase !important;
    border: 1px solid color-mix(in srgb, var(--text-primary) 15%, transparent) !important;
    background: transparent !important;
    color: var(--text-dimmer) !important;
    box-sizing: border-box !important;
    box-shadow: none !important;
    gap: 4px;
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
  }
  .fav-filter.fav-filter--session-util .fav-toggle:hover {
    border-color: color-mix(in srgb, var(--text-primary) 28%, transparent) !important;
    color: var(--text-secondary) !important;
    background: transparent !important;
    box-shadow: none !important;
  }
  .fav-filter.fav-filter--session-util .fav-toggle.on {
    border-color: color-mix(in srgb, var(--text-primary) 35%, transparent) !important;
    background: transparent !important;
    color: var(--text-secondary) !important;
    box-shadow: none !important;
  }
  .fav-filter.fav-filter--session-util .fav-toggle.reset-pill {
    color: var(--text-dimmer) !important;
    flex-shrink: 0;
  }
  .fav-filter.fav-filter--session-util .fav-toggle.reset-pill:hover {
    border-color: color-mix(in srgb, var(--text-primary) 28%, transparent) !important;
    color: var(--text-secondary) !important;
    background: transparent !important;
    box-shadow: none !important;
  }

  .reset-pill { margin-left:auto; }
  .fav-filter.fav-filter--session-util .reset-pill { margin-left: 0; }
  .fav-filter::before {
    display:none;
  }
  .fav-toggle {
    flex:0 0 auto; min-height:0; padding:6px 14px !important; border-radius:20px;
    font-family:'Barlow', sans-serif !important; font-size:12px !important; font-weight:500 !important;
    line-height:1 !important; letter-spacing:0.08em; text-transform:uppercase !important;
    cursor:pointer; transition:border-color 0.18s, background 0.18s, color 0.18s, transform var(--motion-fast), opacity var(--motion-fast); white-space:nowrap;
    border:1px solid var(--glass-border); background:transparent; color:var(--text-dim);
    box-sizing:border-box; display:inline-flex; flex-direction:row; align-items:center; justify-content:center; -webkit-tap-highlight-color: transparent;
    gap: 6px;
  }
  .fav-toggle span { 
    display: inline-flex; align-items: center; justify-content: center; 
    line-height: 0; height: 12px; width: 12px; font-size: 14px; 
    position: relative; top: -0.5px; /* Fine-tuned optical centering */
  }
  /* Hairline borders for interaction pills (non–session-util rows only) */
  [data-theme="dark"] .fav-filter:not(.fav-filter--session-util) .fav-toggle { border-color: rgba(255, 255, 255, 0.2); }
  [data-theme="light"] .fav-filter:not(.fav-filter--session-util) .fav-toggle { border-color: rgba(0, 0, 0, 0.1); }
  /* Keep single-line pills on iPhone widths by reducing tracking instead of wrapping */
  @media (max-width: 420px) {
    .fav-toggle { letter-spacing: 0.10em; }
  }
  @media (max-width: 380px) {
    .fav-toggle { letter-spacing: 0.08em; }
  }
  .fav-toggle:hover { border-color:var(--accent); color:var(--accent); }
  .fav-toggle:active { transform: scale(0.98); opacity: 0.92; }
  .fav-toggle.on { border-color:var(--accent); background:var(--accent-dim); color:var(--accent); }
  .fav-toggle.reset-pill { border-style:solid; color:var(--text-dim); }
  .fav-toggle.reset-pill:hover { border-color:var(--text-secondary); color:var(--text-secondary); }

  /* ── NOTES ── */
  .notes-area { margin-top:10px; }
  .notes-input {
    width:100%; padding:10px 14px; font-family:var(--font-display); font-size: var(--text-sm); border-radius:12px;
    background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--text-primary);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    resize:none; line-height:1.45; outline:none; transition:all 0.2s;
  }
  .notes-input:focus { border-color:var(--glass-border-strong); background:var(--glass-bg-hover); }
  .notes-input::placeholder { color:var(--text-dim); }

  /* ── TAB BAR ── */
  .tab-bar {
    position:fixed; bottom:0; left:0; right:0;
    min-height: var(--axis-tab-h);
    background: var(--tab-bg);
    backdrop-filter: blur(25px) saturate(1.35); -webkit-backdrop-filter: blur(25px) saturate(1.35);
    border-top: 1px solid var(--border);
    display:flex; align-items:center; justify-content:space-around;
    padding: 0 8px calc(env(safe-area-inset-bottom,0px));
    z-index:300;
  }
  .tab-btn {
    display:flex; flex-direction: column; align-items:center; justify-content:center; gap:3px;
    min-width:44px; min-height:44px; width:44px; height:44px;
    padding:0; border:none; cursor:pointer; border-radius:999px;
    background:transparent; color: rgba(225,236,252,0.68);
    transition:color 0.15s, transform var(--motion-fast), opacity var(--motion-fast); position:relative; flex:0 0 auto;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn:active { transform: scale(0.95); opacity: 0.88; }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn { color: color-mix(in srgb, var(--axis-black) 46%, transparent); }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn.active { color: #252525; }

  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn { color: color-mix(in srgb, var(--axis-white) 25%, transparent); }
  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn.active { color: var(--axis-white); }

  .tab-bar[data-night="false"][data-theme="light"] .tab-btn:hover { color: color-mix(in srgb, var(--axis-black) 58%, transparent); }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn.active:hover { color: #252525; }

  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn:hover { color: color-mix(in srgb, var(--axis-white) 25%, transparent); }
  .tab-bar[data-night="false"][data-theme="dark"] .tab-btn.active:hover { color: var(--axis-white); }
  .tab-icon-shell {
    position:relative; display:flex; align-items:center; justify-content:center;
    width:30px; height:30px;
  }
  .tab-btn svg {
    stroke: currentColor;
    fill: none;
    transition: color 0.15s, opacity 0.15s;
    width: 30px;
    height: 30px;
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 1;
  }
  .tab-btn.active .tab-icon-shell::before { content:none; }
  .tab-btn .tab-icon-shell svg { position:relative; z-index:1; }
  .nav-glow-dot {
    width:3px; height:3px; border-radius:50%;
    margin:0;
    align-self: center;
    background: var(--mood-accent);
    box-shadow: 0 0 5px var(--mood-accent);
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .tab-btn.active .nav-glow-dot { opacity: 1; }
  .tab-bar[data-night="false"][data-theme="light"] .tab-btn.active .nav-glow-dot {
    background: var(--accent);
    box-shadow: 0 0 5px var(--accent);
    opacity: 1;
  }
  .tab-bar-spacer {
    height: calc(var(--axis-bottom-content-inset) + var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 56px);
  }

  /* TODAY (solid highlight) sometimes needs extra breathing room */
  .tab-bar-spacer--today {
    height: calc(var(--axis-bottom-content-inset) + var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 140px);
  }

  /* Active SESSION (LIST / GUIDED / SUMMARY): tight tail above tab bar — no duplicate --axis-bottom-content-inset + 56px stack */
  .tab-bar-spacer--session {
    height: calc(var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 12px);
    min-height: 0;
  }

  /* Light mode: distinct tab strip + separation from page (Safari frosted read) — not in AXIS Ultra */
  .tab-bar[data-theme="light"]:not([data-night="true"]) {
    background: var(--tab-bg);
    border-top: 1px solid rgba(100, 130, 175, 0.38);
    box-shadow: 0 -6px 28px rgba(15, 35, 70, 0.1), 0 -1px 0 rgba(255, 255, 255, 0.85) inset;
    backdrop-filter: blur(20px) saturate(1.12);
    -webkit-backdrop-filter: blur(20px) saturate(1.12);
  }

  /* MOOD: avoid stacking full tab-bar-spacer + large list padding (was ~1/4 screen gap). Spacer collapsed; padding carries clearance. */
  .app--nav-gap-tight .tab-bar-spacer--mood {
    height: 0 !important;
    min-height: 0 !important;
    margin: 0 !important;
    padding: 0 !important;
    overflow: hidden;
    pointer-events: none;
  }

  /* One rhythm for Rest→Night and breathing room above tab (no extra row margin) */
  .app--nav-gap-tight .app-body--list-pad {
    padding-bottom: calc(var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) - 16px);
  }

  /* ── HOME ── */
  .home { min-height:100vh; position:relative; z-index:1; }
  .home-hdr { padding: var(--safe-top) var(--page-padding) 0; max-width:100%; }
  .home-wordmark {
    font-size: var(--text-xl); font-weight:600; letter-spacing:0.10em; text-transform:uppercase; font-family: var(--font-display);
    color:var(--text-white); line-height:1; margin-bottom:0;
  }
  .home-eyebrow { display:none; }
  .home-brand { display:flex; flex-direction:column; align-items:flex-start; gap:0; }
  .home-brand-icon { display:none; }
  .home-tagline {
    font-size: var(--text-lg); color:var(--text-white); font-weight:400; font-style:normal;
    padding:18px 0 24px; letter-spacing:-0.01em; max-width:100%; display:block;
    line-height:1.25; text-align:left; margin:0;
  }
  /* End-of-list marker */
  .eol-marker {
    display:flex; align-items:center; justify-content:center;
    min-height:92px;
    padding-top:40px;
    padding-bottom:calc(84px + env(safe-area-inset-bottom, 0px));
    margin-bottom:0;
    --eol-lift: 28px;
    user-select:none; -webkit-user-select:none;
    position:relative; cursor:default; width:100%;
    max-width:100%; overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch;
    box-sizing:border-box;
  }
  .eol-xs {
    font-size: var(--text-xs); letter-spacing:0.8em; font-weight: 400;
    color:var(--eol-color);
    transition:opacity 0.4s ease;
    text-align:center;
    line-height:1;
    position:absolute; top:50%; left:50%; transform:translate(-50%, calc(-50% - var(--eol-lift)));
    white-space:nowrap;
  }
  .eol-tag {
    font-size: var(--text-xs); letter-spacing:0.22em; font-weight: 400;
    color:var(--eol-color);
    text-transform:uppercase;
    position:absolute; top:50%; left:50%; transform:translate(-50%, calc(-50% - var(--eol-lift)));
    opacity:0; transition:opacity 0.4s ease;
    white-space:nowrap; padding:0 12px; box-sizing:border-box;
    line-height:1;
    width:max-content; max-width:min(100vw - 48px, 100%);
  }
  .eol-marker.show-tag .eol-xs { opacity:0; }
  .eol-marker.show-tag .eol-tag { opacity:1; }

  /* ── TRACK GROUPS ── */
  .track-cards-outer { padding:0 var(--page-gutter) 24px; margin-bottom: var(--axis-safe-bottom); }
  /* Ensure final list marker clears fixed tab bar on iPhone */
  .content.content--session.content--session-list .track-cards-outer {
    padding-bottom: calc(var(--axis-tab-clearance) + var(--axis-tab-h) + env(safe-area-inset-bottom, 0px) + 76px);
  }
  .track-group { padding:0; max-width:100%; }
  .track-group + .track-group { margin-top:24px; }
  .track-group-label {
    font-size: var(--text-sm); font-family:var(--font-display); font-weight:500; letter-spacing:0.28em; text-transform:uppercase;
    color:var(--text-dim); margin-bottom:12px;
  }
  .start-here-group { margin-bottom:4px; }
  .start-here-label { color:var(--accent-secondary); letter-spacing:0.22em; }
  /* TODAY hero: body + button colors come from inline styles (accent fill varies) */
  .track-cards { display:flex; flex-direction:column; gap:8px; }

  /* ── TRACK CARD ── */
  .track-card {
    background:var(--glass-bg); backdrop-filter:blur(24px) saturate(1.4); -webkit-backdrop-filter:blur(24px) saturate(1.4);
    border:1px solid var(--glass-border);
    box-shadow:0 24px 48px rgba(0,0,0,0.06), var(--glass-shadow), inset 0 1px 0 var(--glass-specular);
    border-radius:24px; padding:24px var(--page-gutter) 16px; cursor:pointer;
    transition: background 0.22s, border-color 0.22s, box-shadow 0.22s, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display:flex; flex-direction:column; gap:12px; position:relative; overflow:hidden;
  }
  .track-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, var(--glass-specular) 35%, rgba(255,255,255,0.18) 50%, var(--glass-specular) 65%, transparent);
  }
  .track-card:hover {
    background:var(--glass-bg-hover); border-color:var(--glass-border-strong);
    box-shadow:var(--glass-shadow-lg), inset 0 1px 0 var(--glass-specular);
    transform:translateY(-2px);
  }
  .track-card:active { transform:scale(0.98); }
  .track-card-left { flex:1; min-width:0; width:100%; }
  .track-card-name { font-size: var(--text-lg); font-weight:600; color:var(--text-white); margin-bottom:6px; letter-spacing:-0.02em; }
  .track-card-sub { font-size: var(--text-sm); color:var(--accent-secondary); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:6px; line-height:1.4; }
  .track-card-sub .glass-label {
    background: none;
    border: none;
    box-shadow: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    padding: 0;
    border-radius: 0;
    color: var(--mood-accent);
    font-family: 'Barlow', sans-serif;
    font-weight: 600;
    letter-spacing: 0.05em;
    white-space: nowrap;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-card-sub { margin-bottom: 8px; }
  .track-card-purpose { font-size: var(--text-base); margin-top:10px; }
  .track-card-right { display:flex; align-items:center; justify-content:space-between; width:100%; }
  .track-card-dur { font-size: var(--text-sm); font-family:var(--font-display); letter-spacing:0.16em; text-transform:uppercase; color:var(--text-dim); font-weight: 500; }
  .begin-btn {
    padding:8px 22px; font-family:var(--font-display); font-size: var(--text-sm); font-weight:600;
    letter-spacing:0.18em; text-transform:uppercase; cursor:pointer; border-radius:var(--axis-radius);
    background:var(--accent); border:none; color:var(--accent-btn-text);
    -webkit-text-fill-color: currentColor;
    transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    box-shadow:0 2px 12px var(--accent-glow);
    -webkit-tap-highlight-color: transparent;
  }
  .begin-btn:hover { opacity:0.88; transform:scale(1.03); }
  .begin-btn:active { transform: scale(0.97); opacity: 0.92; }
  .session-browse-btn {
    background: var(--accent) !important; border: none !important; color: var(--accent-btn-text) !important;
    -webkit-text-fill-color: currentColor !important;
    box-shadow: 0 2px 12px var(--accent-glow); transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .session-browse-btn:hover { opacity: 0.88; transform: scale(1.03); }
  .session-browse-btn:active { transform: scale(0.97); opacity: 0.92; }
  .app .begin-btn, .app .session-browse-btn, .app .track-card {
    -webkit-tap-highlight-color: transparent;
  }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    position:fixed; top:16px; right:var(--page-gutter); z-index:200; border-radius:50%;
    background:var(--glass-bg); border:1px solid var(--glass-border);
    backdrop-filter:blur(24px) saturate(1.4); -webkit-backdrop-filter:blur(24px) saturate(1.4);
    width:44px; height:44px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-specular);
    transition:background 0.2s, border-color 0.2s, transform var(--motion-fast), opacity var(--motion-fast);
    padding:12px; box-sizing:border-box; -webkit-tap-highlight-color: transparent;
  }
  .theme-toggle:hover { background:var(--glass-bg-hover); border-color:var(--glass-border-strong); }
  .theme-toggle:active { transform: scale(0.95); opacity: 0.9; }
  .theme-toggle svg { stroke:var(--text-secondary); fill:none; }

  /* ── ACCESSIBILITY: focus visible (keyboard / screen reader) ── */
  button:focus-visible, a:focus-visible, .track-card:focus-visible,
  input:focus-visible, [role="button"]:focus-visible {
    outline:2px solid var(--accent);
    outline-offset:2px;
  }
  .track-card { outline:none; }
  /* No focus ring on tab icons — avoids double orange circle around active tab (icon color shows selection) */
  .tab-btn:focus,
  .tab-btn:focus-visible { outline: none; }

  /* ── ACCESSIBILITY: reduced motion ── */
  @media (prefers-reduced-motion: reduce) {

async function bootstrapAxisApp() {
  console.log("BASE REVERT SUCCESSFUL");
  window.__AXIS_DATA_LOAD_ERROR = "";
  try {
    const res = await fetch("./axis_data.json", { cache: "no-store" });
    if (!res.ok) throw new Error("axis_data.json: HTTP " + res.status);
    const data = await res.json();
    window.AXIS_JSON = data;
    if (data && data.TRACKS && Object.keys(data.TRACKS).length) {
      TRACKS = data.TRACKS;
    } else {
      throw new Error("axis_data.json: missing TRACKS");
    }
  } catch (err) {
    console.error("AXIS: workout data load failed", err);
    TRACKS = TRACKS_DATA_FALLBACK;
    window.__AXIS_DATA_LOAD_ERROR = "Workout library could not be loaded from axis_data.json. Sessions will be empty until the file is available next to this page. (" + (err && err.message ? err.message : String(err)) + ")";
  }
  try {
    if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
      showLoadErr("App libraries did not load. Check your connection and refresh.");
      return;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  } catch (e) {
    showLoadErr("Error: " + (e && e.message ? e.message : String(e)) + (e && e.stack ? "\n\n" + e.stack : ""));
  }
}
bootstrapAxisApp();
