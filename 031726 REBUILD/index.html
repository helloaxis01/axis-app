function getCircadianPeriod() {
  const h = new Date().getHours();
  if (h >= 5 && h < 11) return "dawn";
  if (h >= 11 && h < 17) return "midday";
  if (h >= 17 && h < 22) return "prime";
  return "rest";
}

/** sRGB relative luminance → readable ink on solid circadian accent fills */
function inkForAccentHex(hex) {
  const m = /^#?([0-9a-f]{6})$/i.exec(String(hex || "").trim());
  if (!m) return null;
  const n = parseInt(m[1], 16);
  const rs = (n >> 16) / 255, gs = ((n >> 8) & 255) / 255, bs = (n & 255) / 255;
  const lin = (v) => v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  const L = 0.2126 * lin(rs) + 0.7152 * lin(gs) + 0.0722 * lin(bs);
  return L < 0.43 ? "var(--axis-white)" : "var(--axis-black)";
}

function applyCircadianTheme(isDark, period) {
  const p = period || getCircadianPeriod();
  const t = CIRCADIAN_THEMES[p][isDark ? "dark" : "light"];

  if (!el) {el = document.createElement("style");el.id = "circadian-style";document.head.appendChild(el);}
  // Derive cue-bar, tab-bg, and accent-secondary from accent so they always match
  const accentSec = t.accent && t.accent.match(/^#[0-9a-fA-F]{6}$/) ? t.accent + "99" : t.accentSecondary || t.accent;
  el.textContent = `
    [data-theme]:not([data-night="true"]) {
      --orb1: ${t.orb1} !important;
      --orb2: ${t.orb2} !important;
      --orb3: ${t.orb3} !important;

function exerciseSeconds(ex, fallbackSec) {

function exerciseSecondsFromSections(exId, sections, fallbackSec) {
  for (const sec of sections || []) {

// Error capture helper — records errors and promise rejections to localStorage.
// Useful for opaque "Script error" on iOS/Safari; reproduce the issue and then
// check localStorage.getItem('axis_errors') in Safari Web Inspector.
(function installAxisErrorCapture() {
  try {
    function saveRecord(rec) {
      try {
        const existing = JSON.parse(localStorage.getItem('axis_errors') || '[]');
        existing.push(rec);
        // keep last 30
        localStorage.setItem('axis_errors', JSON.stringify(existing.slice(-30)));
        // also expose the last error for quick inspection
        window.__axis_last_error = rec;
      } catch (e) {/* swallow */}
    }

    window.addEventListener('error', function (ev) {
      try {
        const rec = {
          type: 'error',
          message: ev.message || String(ev.error || ev),
          filename: ev.filename || null,
          lineno: ev.lineno || null,
          colno: ev.colno || null,
          stack: ev.error && ev.error.stack ? ev.error.stack : ev.error && ev.error.toString ? ev.error.toString() : null,
          time: new Date().toISOString()
        };
        saveRecord(rec);
      } catch (e) {}
    }, { passive: true });

    window.addEventListener('unhandledrejection', function (ev) {
      try {
        const reason = ev.reason;
        const rec = {
          type: 'unhandledrejection',
          message: reason && reason.message ? reason.message : String(reason),
          stack: reason && reason.stack ? reason.stack : null,
          time: new Date().toISOString()
        };
        saveRecord(rec);
      } catch (e) {}
    }, { passive: true });
  } catch (e) {}
})();

    --font-editorial: 'Lora', Georgia, 'Times New Roman', serif;
    --text-xs: 12px;
    --text-sm: 14px;
    --text-base: 16px;
    --text-lg: 20px;
    --text-2xl: 24px;
    --text-xl: 32px;
    --label-spacing: 0.24em;
  }
  /* Onboarding typography scale (uniform across slides) */
  :root {
    --ob-heading-size: var(--text-2xl);
    --ob-subhead-size: var(--text-lg);
    --ob-body-size: var(--text-base);
    --ob-eyebrow-size: var(--text-xs);
    /* Global app typography to align with onboarding sizes */
    --global-heading-size: var(--text-xl);
    --global-subhead-size: var(--text-lg);
    --global-body-size: var(--text-base);
    --global-eyebrow-size: var(--text-xs);
  }
  /* AXIS design tokens — foundation */
  :root {
    --axis-white: #f6f7f8;
    --axis-black: #252525;
    --axis-radius: 12px;
    --app-white: var(--axis-white);
    --app-black: var(--axis-black);
    --mood-accent: var(--accent, #FF9F43);
    --bg-app: var(--bg-gradient, #080d18);
    --motion-slow: 800ms ease-in-out;
    --motion-fast: 200ms ease-out;
    /* Captions / secondary labels: dimmed brand white */
    --text-secondary-toned: color-mix(in srgb, var(--axis-white) 70%, transparent);
  }
  /* Default UI readability (Inter); display/headlines use Barlow below */
  html, body, #root { font-family: var(--font-ui); }
  .app { font-family: var(--font-ui); }
  .home-wordmark, .track-card-name, .hdr-title, .session-title,
  .fc-name, .fv-name, .guided-exercise-name, .en, .step-label,
  .app .app-label, .page-title, .track-title, .db-title, .timer-val {
    font-family: var(--font-display);
  }
  /* Purpose / instructional copy: Barlow Light Italic (hierarchy vs headers) */
  .fc-pcue, .fv-cue, .step-cue, .purpose-text, .fc-sub, .es, .track-card-purpose, .fv-next span, .tab-desc-line {
    font-family: var(--font-display);
    font-weight: 300;
    font-style: italic;
    line-height: 1.4 !important;
    color: color-mix(in srgb, var(--text-primary) 80%, transparent);
  }
  .fc-pcue, .fv-cue, .step-cue { font-size: var(--text-base); }
  .purpose-text { font-size: calc(var(--text-sm) - 1px); font-style: normal; }
  .fc-sub { font-size: var(--text-sm); }
  .es { font-size: var(--text-xs); }

  /* Map app text/colors to canonical axis colors */
  .app[data-theme="dark"] {
    --text-white: var(--axis-white);
    --text-secondary: rgba(246,247,248,0.75);
    --text-dimmer: rgba(246,247,248,0.32);
    --glass-bg: rgba(246,247,248,0.06);
    --glass-border: rgba(246,247,248,0.12);
  }
  .app[data-theme="light"] {
    --text-white: var(--axis-black);
    --text-secondary: rgba(37,37,37,0.75);
    --text-dimmer: rgba(37,37,37,0.32);
    --glass-bg: rgba(37,37,37,0.06);
    --glass-border: rgba(37,37,37,0.12);
  }

  /* Ensure app icons use currentColor */
  .app svg { stroke: currentColor !important; fill: none !important; }
  /* CatCow diagram needs its internal fills/text to stay visible */
  .exercise-figure--catcow svg .st0 { fill: currentColor !important; }
  .exercise-figure--catcow svg .st2 { stroke: currentColor !important; }
  .exercise-figure--catcow svg text { fill: currentColor !important; }
  .exercise-figure--catcow svg {
    width: 100%;
    height: auto;
    display: block;
    max-width: 100%;
  }
  /* Filled icons (play ▶ on START GUIDED): global fill:none hides polygon fills; WebKit often shows nothing */
  .app .fv-cta svg,
  .app .fv-cta svg * {
    fill: currentColor !important;
    stroke: none !important;
  }
  /* Enforce consistent onboarding sizes (override inline styles if present) */
  .ob-heading { font-size: var(--ob-heading-size) !important; font-weight: 600 !important; font-family: var(--font-display) !important; }
  .ob-subhead, .ob-cta-head { font-size: var(--ob-subhead-size) !important; }
  .ob-body { font-size: var(--ob-body-size) !important; line-height:1.28 !important; }
  .ob-eyebrow { font-size: var(--ob-eyebrow-size) !important; }
  /* Apply normalized sizes to common app areas for consistency */
  .app .app-label,
  .app .home-wordmark,
  .app .app-page-header,
  .app .page-title,
  .app .track-title,
  .app .session-title { font-size: var(--global-heading-size) !important; font-weight: 600 !important; }
  .app .subhead,
  .app .section-title,
  .app .feature-title { font-size: var(--global-subhead-size) !important; font-weight: 600 !important; }
  .app .body,
  .app p,
  .app .desc,
  .app .muted { font-size: var(--global-body-size) !important; }
  .app .eyebrow,
  .app .small-label { font-size: var(--global-eyebrow-size) !important; letter-spacing: 0.12em; text-transform: uppercase; }
  /* App-shell scrolling: single scroll container for native iOS feel */
  .app { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  .app-body, .app-shell, .app-content { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; touch-action: pan-y; -webkit-overflow-scrolling: touch; }
  .app-page-header { padding: var(--safe-top) var(--page-padding) 0; width: 100%; max-width: 100%; box-sizing: border-box; }
  .app-page-bottom-pad { padding-bottom: var(--safe-bottom); }
  .app-label { letter-spacing: var(--label-spacing); }
  /* ── LIQUID GLASS (one card, one bar; same blur/saturation) ── */
  .glass-card { background: var(--glass-bg); backdrop-filter: blur(24px) saturate(1.4); -webkit-backdrop-filter: blur(24px) saturate(1.4); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: var(--glass-shadow); }
  .glass-bar { background: var(--tab-bg); backdrop-filter: blur(28px) saturate(1.4); -webkit-backdrop-filter: blur(28px) saturate(1.4); border: 1px solid var(--border); }
  /* ── GLASS LABEL (compact pill for three-word descriptors) ── */
  .glass-label {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(8px) saturate(1.05);
    -webkit-backdrop-filter: blur(8px) saturate(1.05);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text-secondary);
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 1;
    vertical-align: middle;
  }
  @media (prefers-reduced-motion: reduce) {
    .glass-label { transition: none !important; }
  }
  [data-theme="light"] .glass-label {
    background: rgba(255,255,255,0.72);
    border-color: rgba(160,195,225,0.6);
    color: var(--text-primary);
  }
  /* ── LIQUID GLASS VARIABLES ── */
  [data-theme="dark"] {
    /* Match MAIN_APP_BG.dark: deep navy shell; orbs control most color */
    --bg-gradient: radial-gradient(ellipse at 50% 40%, #0f1f35 0%, #0a1525 45%, #080d18 100%);

    --text-dimmer: rgba(255,255,255,0.32);
    --text-white: var(--axis-white);
    --accent: #FF9F43;
    --accent-secondary: rgba(255,191,101,0.62);
    --accent-dim: rgba(255,191,101,0.18);
    --accent-glow: rgba(255,191,101,0.30);
    --cue-bar: rgba(255,191,101,0.7);
    --cue-bar-label: rgba(255,191,101,0.8);
    --border: rgba(255,255,255,0.08);
    --border-card: rgba(255,255,255,0.10);
    --text-teal: #4a9fd4;

  [data-theme="light"] {
    --bg-gradient: linear-gradient(145deg, #dce6f0 0%, #e4ebf4 35%, #eaf0f7 70%, #f0f5fa 100%);

    --orb2: radial-gradient(ellipse 55% 65% at 90% 75%, rgba(100,160,210,0.09) 0%, transparent 65%);
    --orb3: radial-gradient(ellipse 50% 45% at 55% 5%,  rgba(140,180,220,0.07) 0%, transparent 65%);
    --glass-bg: rgba(255,255,255,0.55);
    --glass-bg-hover: rgba(255,255,255,0.72);
    --glass-border: rgba(200,220,240,0.68);
    --glass-border-strong: rgba(160,195,225,0.78);
    --glass-specular: rgba(255,255,255,0.88);
    --glass-shadow: 0 2px 12px rgba(20,50,90,0.11), 0 1px 4px rgba(20,50,90,0.06);
    --glass-shadow-lg: 0 10px 32px rgba(20,50,90,0.13), 0 2px 10px rgba(20,50,90,0.07);
    /* Tab bar: opaque strip vs lavender gradient (Safari/iOS) */
    --tab-bg: rgba(252, 253, 255, 0.94);
    --hdr-bg: rgba(235,243,250,0.75);
    --text-primary: var(--axis-black);
    --text-secondary: color-mix(in srgb, var(--axis-black) 82%, transparent);
    --text-tertiary: rgba(15,30,46,0.72);
    --text-dim: rgba(15,30,46,0.65);
    --text-dimmer: rgba(15,30,46,0.52);
    --text-white: var(--axis-black);

    --border: rgba(160,195,225,0.30);

    --text-teal: var(--accent);
    --text-done: rgba(15,30,46,0.30);
    --dot-bg: rgba(15,30,46,0.12);
    --dot-done: rgba(15,30,46,0.38);

    --text-dim: rgba(15,30,46,0.68);
    --text-dimmer: rgba(15,30,46,0.58);

    border: none !important;

  }
  /* ── BASE ── */
  .app {
    --axis-tab-h: 64px;
    --axis-tab-clearance: 24px;
    --axis-bottom-content-inset: 120px;
    min-height:100vh;
    min-height:100dvh;
    height:100%;
    width:100%;
    max-width:100vw;
    min-width:0;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    background: var(--bg-app, var(--bg-gradient));
    background-color: var(--bg-fallback, #0a1525);
    color:var(--text-primary);
    font-family:var(--font-display);
    font-weight: 400;
    position:relative;
    transition:color 0.3s;
    box-sizing:border-box;
  }
  @media (prefers-reduced-motion: no-preference) {
    [data-theme]:not([data-night="true"]) .app {
      background: var(--bg-fallback, #0a1525);
      transition: color 0.3s ease, background var(--motion-slow), background-color var(--motion-slow);
    }
    [data-theme]:not([data-night="true"]) .app::before,
    [data-theme]:not([data-night="true"]) .app::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      transition: opacity var(--motion-slow);
    }
    [data-theme]:not([data-night="true"]) .app::before {
      background: var(--bg-app-a, var(--bg-app, var(--bg-gradient)));
      opacity: 1;
    }
    [data-theme]:not([data-night="true"]) .app::after {
      background: var(--bg-app-b, var(--bg-app, var(--bg-gradient)));
      opacity: 0;
    }
    html.axis-mood-xfade--b-top [data-theme]:not([data-night="true"]) .app::before {
      opacity: 0;
    }
    html.axis-mood-xfade--b-top [data-theme]:not([data-night="true"]) .app::after {
      opacity: 1;
    }
    [data-theme]:not([data-night="true"]) .tab-btn.active .tab-icon-shell::before,
    [data-theme]:not([data-night="true"]) .track-btn.active,
    [data-theme]:not([data-night="true"]) .fav-toggle.on {
      transition: background var(--motion-slow), color var(--motion-slow), border-color var(--motion-slow), box-shadow var(--motion-slow);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    [data-theme]:not([data-night="true"]) .app::before,
    [data-theme]:not([data-night="true"]) .app::after {
      content: none !important;
      display: none !important;
    }
  }
  .app-body { flex:1; display:flex; flex-direction:column; width:100%; position:relative; min-height:0; z-index: 1; }
  .app-orbs { position:fixed; inset:0; z-index:1; pointer-events:none; }
  .app-orbs::after {
    content:''; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 40%, rgba(255,255,255,0.02) 60%, transparent 100%);
  }
  /* Light Mode: subtle white wash to keep the gradient clean (not AXIS Ultra) */
  .app[data-theme="light"]:not([data-night="true"]) .app-orbs::after {
    background: rgba(255,255,255,0.85) !important;
  }
  /* Portrait lock: hide app in landscape */
  @media screen and (orientation: landscape) {
    body > * { display: none !important; }
    body::after {
      content: 'Rotate to portrait';
      position: fixed; inset: 0; background: #000; color: #fff;
      display: flex !important; align-items: center; justify-content: center;
      font-family: sans-serif; font-size: 16px; letter-spacing: 0.06em;
      text-transform: uppercase; z-index: 99999;
    }
  }
  @keyframes flowFadeIn {
    from { opacity:0; transform:scale(0.92); }
    to   { opacity:1; transform:scale(1); }
  }
  @keyframes guidedBeginBreath {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  @keyframes flowDonePop {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(0.5); }
    50%  { opacity:1; transform:translate(-50%,-50%) scale(1.1); }
    100% { opacity:1; transform:translate(-50%,-50%) scale(1); }
  }

  /* ── GLASS CARD ── (white hairline only when not AXIS Ultra) */
  .app:not([data-night="true"]) .glass-card,
  .app:not([data-night="true"]) .today-card {
    border-top: 1px solid rgba(255, 255, 255, 0.15) !important;
  }
  [data-night="true"] .glass-card,
  [data-night="true"] .today-card {
    border-top: 1px solid #D32F2F !important;
  }
  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-specular);
    border-radius: 16px;
    transition: background 0.22s, border-color 0.22s, box-shadow 0.22s, transform 0.22s;
    position:relative; overflow:hidden;
  }
  .glass-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--glass-specular) 30%, rgba(255,255,255,0.20) 50%, var(--glass-specular) 70%, transparent);
    pointer-events:none;
  }
  .glass-card:hover {
    background: var(--glass-bg-hover);
    border-color: var(--glass-border-strong);
    box-shadow: var(--glass-shadow-lg), inset 0 1px 0 var(--glass-specular);
  }

  /* ── HEADER ── */
  .hdr-wrap {
    position:sticky; top:0; z-index:200; width:100%;
    background: var(--hdr-bg);
    backdrop-filter: blur(40px) saturate(2.0);
    -webkit-backdrop-filter: blur(40px) saturate(2.0);
    border-bottom: 1px solid var(--glass-border);
    box-shadow: 0 1px 0 var(--glass-specular), 0 4px 20px rgba(0,0,0,0.15);
    box-sizing:border-box;
    padding-top: env(safe-area-inset-top, 0px);

  .hdr { position:relative; padding:0 var(--page-gutter); box-sizing:border-box; width:100%; }
  .hdr-row { display:flex; justify-content:flex-start; align-items:flex-start; padding:68px 0 16px; }
  .hdr-left { flex:1; display:flex; flex-direction:column; gap:8px; align-items:flex-start; width:100%; min-width:0; }
  .back-btn {
    position:absolute; left:16px; top:24px; z-index:2;
    display:flex; align-items:center; justify-content:center;
    width:40px; height:40px; padding:0; margin:0; box-sizing:border-box;
    border-radius:50%; background:transparent; cursor:pointer;
    border:none;
    transition: transform var(--motion-fast), opacity var(--motion-fast);
    -webkit-tap-highlight-color: transparent;
  }
  .back-btn:active { transform: scale(0.97); opacity: 0.9; }
  .hdr-title { font-size: var(--text-xl); font-weight: 600; font-family: var(--font-display); letter-spacing:-0.02em; line-height:1.2; color:var(--text-white); }
  .hdr-meta { display:flex; gap:8px; margin-top:0; align-items:center; flex-wrap:wrap; }
  .hdr-subtitle { font-size: var(--text-sm); font-family: var(--font-display); color:var(--text-secondary); font-style:italic; font-weight:300; line-height:1.4; }
  .hdr-dur {
    font-size: var(--text-sm); font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-secondary); font-family:var(--font-display);
    background:var(--glass-bg); border:1px solid var(--glass-border); padding:4px 12px; border-radius:4px;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    position: relative;
    overflow: hidden;
  }
  .hdr-dur::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    pointer-events: none;
    background: linear-gradient(90deg, transparent, var(--glass-specular) 50%, transparent);
  }

  /* ── SESSION / STREAK BAR ── */
  .streak-bar { display:flex; align-items:center; gap:8px; padding:8px 0 10px; border-bottom:1px solid var(--border); }
  .streak-divider { width:1px; height:14px; background:var(--glass-border); }
  .session-time { font-size: var(--text-base); color:var(--text-secondary); letter-spacing:0.02em; font-weight:400; }
  .session-time-lbl { font-size: var(--text-sm); font-family:var(--font-display); font-weight:500; color:var(--text-dim); letter-spacing:0.14em; text-transform:uppercase; margin-left:4px; }
  .prog-bar { height:4px; background:var(--border); border-radius:4px; overflow:hidden; }
  .prog-fill { height:4px; background:linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 50%, transparent)); transition:width 0.6s cubic-bezier(0.4,0,0.2,1); box-shadow:0 0 10px var(--accent-glow); }

  /* ── TRACK SCROLL ── */
  .track-scroll { overflow-x:auto; display:flex; gap:8px; padding:8px var(--page-gutter) 8px; margin:0 calc(-1 * var(--page-gutter)); border-bottom:1px solid var(--border); scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  .track-scroll::-webkit-scrollbar { display:none; }
  .track-btn {
    padding:6px 16px; font-family:var(--font-display); font-size: var(--text-sm); font-weight: 600;
    letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; transition:all 0.2s;
    white-space:nowrap; flex-shrink:0; border-radius:20px;
    background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--text-secondary);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }
  .track-btn.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); box-shadow:0 0 12px var(--accent-glow); }

  /* ── TABS ── */
  .tabs {
    display:flex; gap:0; width:100%;
    background:transparent;
    padding:0;
  }
  .tab {
    flex:1; padding:12px 0; font-family:var(--font-display); font-size: var(--text-xs); font-weight:500;
    letter-spacing:0.16em; text-transform:uppercase; border:none; cursor:pointer;

    border-bottom: 2px solid transparent;

    color:var(--accent);

  }
  /* sub-bar: tab-desc + progress live here, bleeds to edges, floats above content */
  .tab-subbar {
    position:sticky; top: 0; z-index:190;
    background: var(--hdr-bg);
    backdrop-filter: blur(10px) saturate(1.8);
    -webkit-backdrop-filter: blur(10px) saturate(1.8);
    box-shadow: 0 4px 20px rgba(0,0,0,0.18), 0 1px 0 var(--glass-border);

  /* ── CONTENT ── */
  .content { padding:0 var(--page-gutter) 24px; max-width:100%; position:relative; z-index:1; }

    -webkit-overflow-scrolling: touch;

  /* LIST + GUIDED: breathing room above tab bar for primary CTAs */
  .session-cta-pad { margin-bottom: var(--axis-safe-bottom); padding-bottom: 12px; }

  .sg {

  .sh-name { font-size: var(--text-lg); font-weight: 600; font-family:var(--font-display); letter-spacing:0.08em; text-transform:uppercase; color:var(--text-secondary); }
  .sh-ct { margin-left:auto; font-size: var(--text-xs); font-family:var(--font-display); font-weight:500; color:var(--text-dimmer); letter-spacing:0.06em; }

  /* ── EXERCISE ROW ── */
  .er { display:flex; align-items:center; gap:12px; padding:13px 0; margin:0; border-bottom:1px solid var(--border); cursor:pointer; transition:all 0.2s; position:relative; border-radius:0; }
  .er:hover { background:var(--bg-hover); border-bottom-color:transparent; border-radius:10px; margin:0 -8px; padding:13px 8px; }
  .er.open {
    background:var(--glass-bg); border:1px solid var(--glass-border-strong);
    border-radius:12px 12px 0 0; border-bottom-color:transparent;

  .panel {
    background:var(--glass-bg); border:1px solid var(--glass-border-strong); border-top:none;

  /* ── GUIDED CARD ── */
  .fc {

  .fc-plabel { font-size: var(--text-sm); font-family:var(--font-display); font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-secondary); margin-bottom:4px; }
  .fc-pfocus {

  [data-night="true"] .step-focus,

  .fc-reps { border-top:1px solid var(--border); padding-top:14px; margin-bottom:14px; }
  /* flow fullscreen overlay */
  .fv-overlay {

  }
  .fv-top-bar {

  /* main card */

  .fv-cue { font-size: var(--text-lg); }

  /* action bar */

  }
  .fv-cta {

  /* ── STEPS (A/B/C cues) ── */

  /* Force-hide step number circles even if earlier rules include display:flex */

  .step-badge,
  .step-badge-inner {
    display: none !important;
  }
  .step-pos { font-size: var(--text-sm); font-family:var(--font-display); font-weight:600; letter-spacing:0; color:var(--accent-secondary); }
  .step-right { flex:1; text-align:left; }

  .step-focus { font-size: calc(var(--text-xs) + 2px); font-family:var(--font-display); color:var(--accent-secondary); letter-spacing:0.1em; margin-top:8px; font-weight:500; text-transform:uppercase; }

  /* ── TIMER ── */
  .timer-wrap {

    display:flex; flex-direction:column; gap:14px;
  }

  .timer-next { text-align:right; }

  .tb {

  }

  /* ── DONE BANNER ── */
  .done-banner {

  const [showTag, setShowTag] = useState(false);
  const holdRef = useRef(null);
  const timerRef = useRef(null);

  const startPress = () => {
    holdRef.current = setTimeout(() => {
      if (navigator.vibrate) navigator.vibrate(10);
      setShowTag(true);
      timerRef.current = setTimeout(() => setShowTag(false), 2000);
    }, 600);
  };
  const endPress = () => {clearTimeout(holdRef.current);};

  return (/*#__PURE__*/
    React.createElement("div", {
      className: "eol-marker" + (showTag ? " show-tag" : ""),
      onMouseDown: startPress, onMouseUp: endPress, onMouseLeave: endPress,
      onTouchStart: startPress, onTouchEnd: endPress }, /*#__PURE__*/

    React.createElement("span", { className: "eol-xs" }, "X X X X"), /*#__PURE__*/
    React.createElement("span", { className: "eol-tag" }, "X MOVE X MEND X MAINTAIN X")
    ));

}
