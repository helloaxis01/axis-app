function AxisIcon({ size = 72, color = "#F0EEEB" }) {
  const S = size;
  const pad = S * 0.05, usable = S - pad * 2, spacing = usable * 0.5;
  const xSize = spacing * 0.78, strokeW = S * 0.09, off = spacing / 2;
  const positions = [
    [S/2 - off, S/2 - off], [S/2 + off, S/2 - off],
    [S/2 - off, S/2 + off], [S/2 + off, S/2 + off],
  ];
  return (
    <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`}>
      {positions.flatMap(([x, y]) =>
        [-45, 45].map(angle => (
          <rect key={`${x}-${y}-${angle}`}
            x={x - xSize/2} y={y - strokeW/2}
            width={xSize} height={strokeW}
            fill={color}
            transform={`rotate(${angle} ${x} ${y})`}
          />
        ))
      )}
    </svg>
  );
}

function storageGet(key, def) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : def; } catch { return def; }
}
function storageSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function getCircadianPeriod() {
  const h = new Date().getHours();
  if (h >= 5  && h < 11) return "dawn";
  if (h >= 11 && h < 17) return "midday";
  if (h >= 17 && h < 22) return "prime";
  return "rest";
}

function applyCircadianTheme(isDark, period) {
  const p = period || getCircadianPeriod();
  const t = CIRCADIAN_THEMES[p][isDark ? "dark" : "light"];
  let el = document.getElementById("circadian-style");
  if (!el) { el = document.createElement("style"); el.id = "circadian-style"; document.head.appendChild(el); }
  // Derive cue-bar, tab-bg, and accent-secondary from accent so they always match
  const accentSec = t.accent && t.accent.match(/^#[0-9a-fA-F]{6}$/) ? t.accent + "99" : (t.accentSecondary || t.accent);
  el.textContent = `
    [data-theme]:not([data-night="true"]) {
      --orb1: ${t.orb1} !important;
      --orb2: ${t.orb2} !important;
      --orb3: ${t.orb3} !important;
      --accent: ${t.accent} !important;
      --accent-secondary: ${accentSec} !important;
      --accent-dim: ${t.accentDim} !important;
      --accent-glow: ${t.accentGlow} !important;
      --cue-bar: ${t.accentDim.replace(/[\d.]+\)$/, "0.7)")} !important;
      --cue-bar-label: ${t.accentDim.replace(/[\d.]+\)$/, "0.9)")} !important;
      ${t.textPrimary ? `--text-white: ${t.textPrimary} !important;` : ""}
      ${t.accentBtnText ? `--accent-btn-text: ${t.accentBtnText} !important;` : ""}
      ${t.tabBg ? `--tab-bg: ${t.tabBg} !important;` : ""}
    }
    .app-orbs { transition: background 0.4s ease !important; }
  `;
  return { bg: t.bg };
}

                AXIS provides movement guidance for general wellness purposes only. It is not a substitute for professional medical advice, diagnosis, or treatment. The exercises and routines in this app are not designed to treat any medical condition.
                <br/><br/>
                If you have any injury, chronic pain, cardiovascular condition, or other health concern, consult a qualified healthcare professional before beginning any exercise program. Stop immediately and seek medical attention if you experience pain, dizziness, shortness of breath, or discomfort during any movement.
                <br/><br/>
                By continuing, you acknowledge that you are participating voluntarily and assume full responsibility for your use of this app.
              </div>

              <div style={{width:"100%", marginBottom:20}}>
                <div style={{fontSize:11, letterSpacing:"0.18em", textTransform:"uppercase", color:"var(--ob-text-sec)", marginBottom:8, fontWeight:500}}>Your Name</div>
                <input
                  type="text"
                  placeholder="Full name"
                  value={disclaimerName}
                  onChange={e => { setDisclaimerName(e.target.value); setDisclaimerWarning(false); }}
                  style={{
                    width:"100%", padding:"12px 16px", borderRadius:12, fontSize:15,
                    fontFamily:"'Barlow',sans-serif", fontWeight:400,
                    background:"var(--ob-box-bg)", border: disclaimerWarning && !disclaimerName ? "1.5px solid rgba(255,100,100,0.7)" : "1px solid var(--ob-box-border)",
                    color:"var(--ob-text-head)", outline:"none", boxSizing:"border-box",
                    WebkitAppearance:"none",
                  }}
                />
              </div>

              <div style={{width:"100%", marginBottom:24}}>
                <div style={{fontSize:11, letterSpacing:"0.18em", textTransform:"uppercase", color:"var(--ob-text-sec)", marginBottom:8, fontWeight:500}}>Date</div>
                <div style={{
                  padding:"12px 16px", borderRadius:12, fontSize:15,
                  fontFamily:"'Barlow',sans-serif", fontWeight:400,
                  background:"var(--ob-box-bg)", border:"1px solid var(--ob-box-border)",
                  color:"var(--ob-text-sec)",
                }}>{todayStr}</div>
              </div>

              <div
                className="ob-disclaimer-check"
                onClick={() => { setDisclaimerChecked(c => !c); setDisclaimerWarning(false); }}
                style={{display:"flex", alignItems:"flex-start", gap:14, marginBottom:28, cursor:"pointer", width:"100%"}}
              >
                <div style={{
                  flexShrink:0, width:22, height:22, borderRadius:6, marginTop:1,
                  border: disclaimerWarning && !disclaimerChecked ? "1.5px solid rgba(255,100,100,0.7)" : "1.5px solid var(--ob-box-border)",
                  background: disclaimerChecked ? "var(--ob-accent)" : "var(--ob-box-bg)",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  transition:"all 0.18s",
                }}>
                  {disclaimerChecked && <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                    <path d="M1 5L4.5 8.5L11 1.5" stroke="#0a0e1a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>}
                </div>
                <div style={{fontSize:13, lineHeight:1.45, color:"var(--ob-text-body)", fontWeight:300}}>
                  I have read and understand the disclaimer above. I confirm I am using this app at my own risk and will consult a healthcare professional if I have any concerns.
                </div>
              </div>

              {disclaimerWarning && (
                <div style={{
                  width:"100%", marginBottom:16, padding:"10px 14px", borderRadius:10,
                  background:"rgba(255,80,80,0.12)", border:"1px solid rgba(255,80,80,0.25)",
                  fontSize:12, color:"rgba(255,160,160,0.9)", lineHeight:1.5,
                }}>
                  {!disclaimerName && !disclaimerChecked
                    ? "Please enter your name and check the box to continue."
                    : !disclaimerName
                    ? "Please enter your name to continue."
                    : "Please check the box to confirm you've read the disclaimer."}
                </div>
              )}
              </div>
            </div>
          </div>}

          {/* 5: APPEARANCE — no logo, content 76px from top (matches other content pages) */}
          {cur === 5 && <div className="ob-screen ob-appearance ob-content-only" style={{ transition: "background-color 0.6s ease, color 0.6s ease" }}>
            <div className="ob-screen-body" style={{ position: "relative", zIndex: 10 }}>
              <div className="ob-pad">
              <div className="ob-eyebrow">Appearance</div>
              <div className="ob-heading" style={{fontSize:36}}>Set your <em>mood.</em></div>
              <div className="ob-body" style={{marginBottom:28, fontSize:14}}>
                Pick a theme; you can change it anytime in the app.
              </div>

              {/* Dark / Light toggle — span full width halves, text centered */}
              <div className="ob-theme-toggles" style={{display:"flex",gap:10,marginBottom:24}}>
                {[{val:"dark",label:"Dark"},{val:"light",label:"Light"}].map(({val,label}) => (
                  <button key={val} onClick={()=>setObTheme(val)} style={{
                    flex:1, padding:"11px 0", borderRadius:12, cursor:"pointer",
                    display:"flex", alignItems:"center", justifyContent:"center", textAlign:"center",
                    fontFamily:"'Barlow',sans-serif", fontSize:12, fontWeight:600,
                    letterSpacing:"0.14em", textTransform:"uppercase",
                    border: obTheme===val ? "2px solid var(--ob-accent)" : (obTheme==="light" ? "1.5px solid rgba(15,23,42,0.38)" : "1px solid var(--ob-box-border)"),
                    background: obTheme===val ? "var(--ob-accent-dim)" : (obTheme==="light" ? obAppearLightCtaBg : "var(--ob-box-bg)"),
                    color: obTheme===val ? "var(--ob-accent)" : (obTheme==="light" ? "#0f172a" : "var(--ob-text-sec)"),
                    boxShadow: obTheme==="light" && obTheme!==val ? "inset 0 0 0 1px rgba(15,23,42,0.08)" : "none",
                    transition:"all 0.18s",
                  }}>{label}</button>
                ))}
              </div>

              {/* Auto time of day — same box chrome as Dark/Light CTAs */}
              <div className="ob-theme-toggles" style={{marginBottom:24}}>
                <div style={{
                  display:"flex",alignItems:"center",justifyContent:"space-between",
                  padding:"14px 16px",borderRadius:12,width:"100%",boxSizing:"border-box",
                  background: obAutoTime ? "var(--ob-accent-dim)" : (obTheme==="light" ? obAppearLightCtaBg : "var(--ob-box-bg)"),
                  border: obAutoTime ? "2px solid var(--ob-accent)" : (obTheme==="light" ? "1.5px solid rgba(15,23,42,0.38)" : "1px solid var(--ob-box-border)"),
                  boxShadow: obTheme==="light" && !obAutoTime ? "inset 0 0 0 1px rgba(15,23,42,0.08)" : "none",
                  transition:"all 0.18s",
                }}>
                  <div>
                    <div style={{
                      fontFamily:"'Barlow',sans-serif",fontSize:12,fontWeight:600,letterSpacing:"0.14em",textTransform:"uppercase",
                      color:obAutoTime?"var(--ob-accent)":(obTheme==="light"?"#0f172a":"var(--ob-text-sec)"),
                      marginBottom:4,
                    }}>Auto</div>
                    <div style={{fontSize:12,color:obTheme==="light"?"#334155":"var(--ob-text-sec)"}}>Set and forget — colors follow the time of day</div>
                  </div>
                  <button type="button" role="switch" aria-checked={obAutoTime} onClick={()=>setObAutoTime(v=>!v)} style={{
                    width:48,height:28,border:"1.5px solid",borderColor:obAutoTime?"var(--ob-accent)":(obTheme==="light"?"rgba(15,23,42,0.35)":"var(--ob-box-border)"),
                    borderRadius:14,background:obAutoTime?"var(--ob-accent)":(obTheme==="light"?obAppearLightCtaBg:"var(--ob-box-bg)"),cursor:"pointer",position:"relative",transition:"all 0.2s",
                  }}>
                    <div style={{position:"absolute",top:3,left:obAutoTime?24:3,width:20,height:20,borderRadius:"50%",background:obTheme==="dark"?"#fff":"#111",transition:"left 0.2s",boxShadow:"0 1px 4px rgba(0,0,0,0.3)"}}/>
                  </button>
                </div>
              </div>

              {/* Choose a mood / color — match main app Mood styling */}
              <div style={{fontSize:11,letterSpacing:"0.2em",textTransform:"uppercase",color:obTheme==="light"?"#475569":"var(--ob-text-sec)",fontWeight:600,marginBottom:10}}>
                {obAutoTime ? "Or choose a fixed mood" : "Choose a mood"}
              </div>
              <div className="ob-mood-list" style={{display:"flex",flexDirection:"column",gap:10,opacity:obAutoTime ? 0.85 : 1,marginBottom:32}}>
                {[
                  { p:"dawn",    label:"Dawn",    time:"5–11am",   desc:"Warm amber",
                    icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 16 A 8 8 0 0 1 20 16"/><line x1="0" y1="16" x2="24" y2="16"/></svg> },
                  { p:"midday",  label:"Midday",  time:"11am–5pm", desc:"Cool mint",
                    icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/></svg> },
                  { p:"prime",   label:"Prime",   time:"5–10pm",   desc:"Deep blue",
                    icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg> },
                  { p:"rest",    label:"Rest",    time:"10pm–5am", desc:"Soft violet",
                    icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.5 5.5 6 .5-4.5 4 1.5 5.5L12 16l-4.5 2 1.5-5.5-4.5-4 6-.5L12 3z"/></svg> },
                ].map(({p, label, time, desc, icon}) => {
                  const ct = CIRCADIAN_THEMES[p][obTheme === "dark" ? "dark" : "light"];
                  const isSelected = obPeriod === p;
                  const isNow = getCircadianPeriod() === p;
                  const iconStroke = isSelected ? ct.accent : (obTheme === "light" ? "#1e293b" : ct.accent);
                  const iconWithColor = React.cloneElement(icon, { stroke: iconStroke, strokeWidth: obTheme === "light" ? 1.75 : 1, fill: "none", style: { overflow: "hidden", flexShrink: 0 } });
                  return (
                    <button key={p} onClick={()=>{ setObPeriod(p); setHasChosenMood(true); }} style={{
                      display:"flex", alignItems:"center", gap:16, padding:"16px 18px",
                      borderRadius:16, cursor:"pointer", textAlign:"left", width:"100%", boxSizing:"border-box",
                      border: isSelected ? `2px solid ${ct.accent}` : (obTheme==="light" ? "1.5px solid rgba(15,23,42,0.34)" : "1px solid var(--ob-box-border)"),
                      background: isSelected ? ct.accentDim : (obTheme==="light" ? obAppearLightCtaBg : "var(--ob-box-bg)"),
                      boxShadow: obTheme==="light" ? "0 1px 3px rgba(15,23,42,0.08)" : "none",
                      transition: "all 0.18s"
                    }}>
                      <div style={{
                        width:44, height:44, borderRadius:12, flexShrink:0, display:"flex",
                        alignItems:"center", justifyContent:"center", overflow:"hidden",
                        background: ct.bg.includes("gradient") ? ct.bg : ct.accentDim,
                        border: obTheme==="light" ? `2px solid ${isSelected ? ct.accent : "rgba(15,23,42,0.28)"}` : `1px solid ${ct.accent}`,
                        ["--accent"]: ct.accent,
                        color: ct.accent,
                      }}>{iconWithColor}</div>
                      <div style={{flex:1, minWidth:0}}>
                        <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:2}}>
                          <span style={{fontWeight:600,color:isSelected?ct.accent:(obTheme==="light"?"#0f172a":"var(--ob-text-head)"),fontFamily:"'Barlow',sans-serif"}}>{label}</span>
                          <span style={{color:obTheme==="light"?"#475569":"var(--ob-text-dim)"}}>{time}</span>
                          {isNow && <span style={{letterSpacing:"0.14em",textTransform:"uppercase",color:obTheme==="light"?"#0f172a":"var(--ob-accent)",opacity:obTheme==="light"?0.85:0.7}}>now</span>}
                        </div>
                        <div style={{color:obTheme==="light"?"#334155":"var(--ob-text-sec)"}}>{desc}</div>
                      </div>
                      {isSelected && <div style={{width:7,height:7,borderRadius:"50%",background:ct.accent,flexShrink:0}}/>}
                    </button>
                  );
                })}
              </div>
              </div>
            </div>
          </div>}

          {/* 6: LAUNCH — same logo + tagline as Splash */}
          {cur === 6 && (
            <div className="ob-screen ob-cta-screen ob-launch-screen" style={{ color: "var(--ob-text-head)", transition: "color 0.6s ease", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh" }}>
              <img src={obTheme === "dark" ? "./AXIS_Branding_DarkMode_Outlined.svg" : "./AXIS_Branding_LightMode_Outlined.svg"} alt="AXIS Logo" style={{ marginTop: "calc(90px + 5vh)", width: 165 }} />
              <div className="ob-screen-body">
                <div className="ob-pad" style={{ textAlign: "center" }}>
                  <div className="ob-splash-tag" style={{ marginTop: "10vh" }}>X &nbsp;MOVE &nbsp;X&nbsp; MEND &nbsp;X&nbsp; MAINTAIN &nbsp;X</div>
                </div>
              </div>
            </div>
          )}

      </div>

      <div className="ob-ext-nav">
        {["Splash","Alpha","Perspective","Science+Ethics","Safety","Appearance","Launch"].map((l, i) => (
          <button key={l} className="ob-en-btn" onClick={() => go(i)}>{l}</button>
        ))}
        <button className="ob-en-btn" style={{ borderColor: "#FFBF65", color: "#FFBF65" }} onClick={() => go(6)}>→ Launch Screen</button>
      </div>
      <div className="ob-label">Tap screen or use controls · Begin buttons launch the app</div>
      {/* Fixed footer — pointer-events: none; buttons have pointer-events: auto */}
      <div
        className="ob-nav-footer"
        style={{
          position: 'fixed', bottom: 0, left: 0, right: 0, width: 'auto', height: 110,
          paddingBottom: 'max(34px, env(safe-area-inset-bottom, 0px))', paddingTop: 16, paddingLeft: 24, paddingRight: 24,
          zIndex: 1000, pointerEvents: 'none',
          display: 'flex', alignItems: 'center', justifyContent: 'stretch', boxSizing: 'border-box',
          gap: 0,
          backdropFilter: 'blur(15px)', WebkitBackdropFilter: 'blur(15px)',
          background: obTheme === 'dark' ? 'rgba(10,14,26,0.85)' : 'rgba(255,255,255,0.92)',
          borderTop: obTheme === 'dark' ? '0.5px solid rgba(255,255,255,0.2)' : '0.5px solid rgba(0,0,0,0.1)',
          transition: 'background 0.6s ease',
        }}
      >
        {cur === 6 ? (
          <div className="ob-footer-nav-locked">
            <button
              type="button"
              className="ob-nav-back ob-nav-glass-btn ob-footer-nav-cell--back"
              onClick={() => go(5)}
              style={{
                background: obTheme === 'dark' ? 'rgba(255,255,255,0.12)' : 'rgba(15,23,42,0.12)',
                border: obTheme === 'dark' ? 'none' : '1px solid rgba(15,23,42,0.35)',
                borderRadius: 8,
                padding: '10px 18px', color: obTheme === 'dark' ? '#ffffff' : '#252525',
                cursor: 'pointer', pointerEvents: 'auto',
                fontFamily: "'Barlow', sans-serif", fontSize: 12, fontWeight: 600, letterSpacing: '0.12em',
              }}
            >BACK</button>
            <div className="ob-footer-nav-cell--dots" style={{ visibility: 'hidden' }} aria-hidden />
            <button
              type="button"
              className="ob-nav-letsgo ob-footer-nav-cell--next"
              onClick={doLaunch}
              style={{
                pointerEvents: 'auto',
                padding: '12px 28px', borderRadius: 999, border: 'none',
                background: obTheme === 'dark' ? '#ffffff' : '#1a1a1a',
                color: obTheme === 'dark' ? '#1a1a1a' : '#ffffff',
                fontFamily: "'Barlow', sans-serif", fontSize: 13, fontWeight: 700,
                letterSpacing: '0.18em', textTransform: 'uppercase',
                cursor: 'pointer', transition: 'all 0.25s ease',
              }}
            >
              LET'S GO
            </button>
          </div>
        ) : (
          <div className="ob-footer-nav-locked">
            <button
              type="button"
              className="ob-nav-back ob-nav-glass-btn ob-footer-nav-cell--back"
              onClick={() => go(Math.max(0, cur - 1))}
              style={{
                background: obTheme === 'dark' ? 'rgba(255,255,255,0.12)' : 'rgba(15,23,42,0.12)',
                border: obTheme === 'dark' ? 'none' : '1px solid rgba(15,23,42,0.35)',
                borderRadius: 8,
                padding: '10px 18px', color: obTheme === 'dark' ? '#ffffff' : '#252525',
                cursor: 'pointer', pointerEvents: 'auto',
                fontFamily: "'Barlow', sans-serif", fontSize: 12, fontWeight: 600, letterSpacing: '0.12em',
              }}
            >BACK</button>
            <div className="ob-footer-dots ob-footer-nav-cell--dots">
              {Array.from({ length: 7 }).map((_, i) => {
                const active = i === cur;
                return (
                  <div key={i} className="ob-footer-dot-slot" aria-hidden>
                    <div
                      className="ob-footer-dot-inner"
                      style={{
                        width: active ? 8 : 6,
                        height: active ? 8 : 6,
                        background: active ? (obTheme === 'dark' ? '#ffffff' : '#1a1a1a') : (obTheme === 'dark' ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.1)'),
                      }}
                    />
                  </div>
                );
              })}
            </div>
            <button
              type="button"
              className="ob-nav-next ob-nav-glass-btn ob-footer-nav-cell--next"
              onClick={() => {
                if (cur === 4) { doSafetyNext(); return; }
                if (cur === 5) { if (obPeriod == null) { setObPeriod(getCircadianPeriod()); setHasChosenMood(true); } go(6); return; }
                if (cur < total - 1) go(cur + 1);
              }}
              disabled={cur === 4 && (!disclaimerName.trim() || !disclaimerChecked)}
              style={{
                pointerEvents: 'auto',
                background: obTheme === 'dark' ? 'rgba(255,255,255,0.12)' : 'rgba(15,23,42,0.12)',
                border: obTheme === 'dark' ? 'none' : '1px solid rgba(15,23,42,0.35)',
                borderRadius: 8,
                padding: '10px 18px', color: obTheme === 'dark' ? '#ffffff' : '#252525',
                fontFamily: "'Barlow', sans-serif", fontSize: 12, fontWeight: 600, letterSpacing: '0.12em',
                opacity: cur === 4 && !disclaimerChecked ? 0.3 : 1,
                cursor: cur === 4 && (!disclaimerName.trim() || !disclaimerChecked) ? 'not-allowed' : 'pointer',
              }}
              aria-disabled={cur === 4 && (!disclaimerName.trim() || !disclaimerChecked)}
            >NEXT</button>
          </div>
        )}
      </div>
    </div>
  );
}

try {
  if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
    showLoadErr('App libraries did not load. Check your connection and refresh.');
  } else {
    const root = document.getElementById('root');
    if (root) {
      ReactDOM.createRoot(root).render(<Onboarding theme="dark" onComplete={() => {}} />);
    }
  }
} catch (e) {
  showLoadErr('Error: ' + (e && e.message ? e.message : String(e)) + (e && e.stack ? '\n\n' + e.stack : ''));
}
</script>
</body>
</html>
