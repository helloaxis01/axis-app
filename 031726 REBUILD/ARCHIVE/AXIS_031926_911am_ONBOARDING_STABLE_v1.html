/* AXIS canonical colors */
:root {
  --axis-white: #f6f7f8;
  --axis-black: #252525;
}

/* Onboarding: map existing ob- variables to AXIS colors (dark/light contexts) */
.ob-screen[data-theme="dark"], .ob-screen[data-night="false"], .ob-screen {
  --ob-text-head: var(--axis-white);
  --ob-text-body: rgba(246,247,248,0.90);
  --ob-text-sec: rgba(246,247,248,0.72);
  --ob-text-dim: rgba(246,247,248,0.50);
  --glass-bg: rgba(246,247,248,0.06);
  --glass-border: rgba(246,247,248,0.12);
}
.ob-screen[data-theme="light"], .ob-screen.light {
  --ob-text-head: var(--axis-black);
  --ob-text-body: rgba(37,37,37,0.90);
  --ob-text-sec: rgba(37,37,37,0.72);
  --ob-text-dim: rgba(37,37,37,0.50);
  --glass-bg: rgba(37,37,37,0.06);
  --glass-border: rgba(37,37,37,0.12);

/* Ensure text defaults are not forced globally; allow component CSS to control alignment */
body { font-family: 'Barlow', sans-serif !important; }

/* Fix the 'wonky' centering */
.ob-screen {
    display: flex !important;
    flex-direction: column;
    justify-content: flex-start !important;
    align-items: flex-start !important;
    min-height: 100dvh;
    text-align: left !important;
    padding: 60px 24px !important;

/* Button/icon reset ONLY for the main app shell so onboarding keeps themed controls */
.app button, .app button * { color: #000000 !important; }
.app button svg { fill: #000000 !important; stroke: #000000 !important; }

/* Mood button labels use inline colors; do not force button color (breaks icon accent) */
  .ob-wrap {

  .ob-orbs-layer { position:fixed; inset:0; z-index:0; pointer-events:none; }

  .ob-label { display:none; }

  .ob-screen { width:100%; min-height:100vh; display:flex; flex-direction:column; justify-content:flex-start; align-items:flex-start; position:relative; box-sizing:border-box; animation:obFadeIn 0.3s ease; text-align:left; }

  .sh-ct { font-size:13px; color:var(--ob-text-dim); }

  .purpose-text { font-size:13px; color:var(--ob-text-body); }

function AxisIcon({ size = 72, color = "#F0EEEB" }) {
  const S = size;
  const pad = S * 0.05, usable = S - pad * 2, spacing = usable * 0.5;
  const xSize = spacing * 0.78, strokeW = S * 0.09, off = spacing / 2;
  const positions = [
    [S/2 - off, S/2 - off], [S/2 + off, S/2 - off],
    [S/2 - off, S/2 + off], [S/2 + off, S/2 + off],
  ];
  return (
    <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`}>
      {positions.flatMap(([x, y]) =>
        [-45, 45].map(angle => (
          <rect key={`${x}-${y}-${angle}`}
            x={x - xSize/2} y={y - strokeW/2}
            width={xSize} height={strokeW}
            fill={color}
            transform={`rotate(${angle} ${x} ${y})`}
          />
        ))
      )}
    </svg>
  );
}

function storageGet(key, def) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : def; } catch { return def; }
}
function storageSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function getCircadianPeriod() {
  const h = new Date().getHours();
  if (h >= 5  && h < 11) return "dawn";
  if (h >= 11 && h < 17) return "midday";
  if (h >= 17 && h < 22) return "prime";
  return "rest";
}

function applyCircadianTheme(isDark, period) {
  const p = period || getCircadianPeriod();
  const t = CIRCADIAN_THEMES[p][isDark ? "dark" : "light"];
  let el = document.getElementById("circadian-style");
  if (!el) { el = document.createElement("style"); el.id = "circadian-style"; document.head.appendChild(el); }
  // Derive cue-bar, tab-bg, and accent-secondary from accent so they always match
  const accentSec = t.accent && t.accent.match(/^#[0-9a-fA-F]{6}$/) ? t.accent + "99" : (t.accentSecondary || t.accent);
  el.textContent = `
    [data-theme]:not([data-night="true"]) {
      --orb1: ${t.orb1} !important;
      --orb2: ${t.orb2} !important;
      --orb3: ${t.orb3} !important;
      --accent: ${t.accent} !important;
      --accent-secondary: ${accentSec} !important;
      --accent-dim: ${t.accentDim} !important;
      --accent-glow: ${t.accentGlow} !important;
      --cue-bar: ${t.accentDim.replace(/[\d.]+\)$/, "0.7)")} !important;
      --cue-bar-label: ${t.accentDim.replace(/[\d.]+\)$/, "0.9)")} !important;
      ${t.textPrimary ? `--text-white: ${t.textPrimary} !important;` : ""}
      ${t.accentBtnText ? `--accent-btn-text: ${t.accentBtnText} !important;` : ""}
      ${t.tabBg ? `--tab-bg: ${t.tabBg} !important;` : ""}
    }
    .app-orbs { transition: background 0.4s ease !important; }
  `;
  return { bg: t.bg };
}

                  }
                  const record = {
                    name: disclaimerName.trim(),
                    date: new Date().toISOString().split("T")[0],
                    timestamp: new Date().toISOString(),
                    accepted: true,
                  };
                  try { localStorage.setItem("axis_disclaimer", JSON.stringify(record)); } catch(e) {}
                  go(5);
                }}
              >Next</button>
              <div className="ob-pad-after-cta" aria-hidden />
            </div>
          </div>}

          {/* 5: APPEARANCE */}
          {cur === 5 && <div className="ob-screen ob-appearance" style={{ transition: "background-color 0.6s ease" }}>
            <div className="ob-pad" style={{ paddingTop: "calc(env(safe-area-inset-top, 0px) + 51px)" }}>
              <div className="ob-eyebrow">Appearance</div>
              <div className="ob-heading" style={{fontSize:36}}>Set your <em>mood.</em></div>
              <div className="ob-body" style={{marginBottom:28, fontSize:14}}>
                Pick a theme; you can change it anytime in the app.
              </div>

              {/* Dark / Light toggle — span full width halves, text centered */}
              <div className="ob-theme-toggles" style={{display:"flex",gap:10,marginBottom:24}}>
                {[{val:"dark",label:"Dark"},{val:"light",label:"Light"}].map(({val,label}) => (
                  <button key={val} onClick={()=>setObTheme(val)} style={{
                    flex:1, padding:"11px 0", borderRadius:12, cursor:"pointer",
                    display:"flex", alignItems:"center", justifyContent:"center", textAlign:"center",
                    fontFamily:"'Barlow',sans-serif", fontSize:12, fontWeight:600,
                    letterSpacing:"0.14em", textTransform:"uppercase",
                    border: obTheme===val ? "1.5px solid var(--ob-accent)" : "1px solid var(--ob-box-border)",
                    background: obTheme===val ? "var(--ob-accent-dim)" : "var(--ob-box-bg)",
                    color: obTheme===val ? "var(--ob-accent)" : "var(--ob-text-sec)",
                    transition:"all 0.18s",
                  }}>{label}</button>
                ))}
              </div>

              {/* Auto time of day — optional "set and forget" */}
              <div style={{marginBottom:20}}>
                <div style={{
                  display:"flex",alignItems:"center",justifyContent:"space-between",
                  padding:"16px 18px",borderRadius:14,
                  background: obAutoTime ? "var(--ob-accent-dim)" : "var(--ob-box-bg)",
                  border: obAutoTime ? "1.5px solid var(--ob-accent)" : "1px solid var(--ob-box-border)",
                  transition:"all 0.2s",
                }}>
                  <div>
                    <div style={{fontSize:15,color:obAutoTime?"var(--ob-accent)":"var(--ob-text-head)",fontWeight:600,marginBottom:2}}>Auto</div>
                    <div style={{fontSize:12,color:"var(--ob-text-sec)"}}>Set and forget — colors follow the time of day</div>
                  </div>
                  <button type="button" role="switch" aria-checked={obAutoTime} onClick={()=>setObAutoTime(v=>!v)} style={{
                    width:48,height:28,border:"1px solid",borderColor:obAutoTime?"var(--ob-accent)":"var(--ob-box-border)",
                    borderRadius:14,background:obAutoTime?"var(--ob-accent)":"var(--ob-box-bg)",cursor:"pointer",position:"relative",transition:"all 0.2s",
                  }}>
                    <div style={{position:"absolute",top:3,left:obAutoTime?24:3,width:20,height:20,borderRadius:"50%",background:obTheme==="dark"?"#fff":"#111",transition:"left 0.2s",boxShadow:"0 1px 4px rgba(0,0,0,0.3)"}}/>
                  </button>
                </div>
              </div>

              {/* Choose a mood / color — match main app Mood styling */}
              <div style={{fontSize:11,letterSpacing:"0.2em",textTransform:"uppercase",color:"var(--ob-text-sec)",marginBottom:10}}>
                {obAutoTime ? "Or choose a fixed mood" : "Choose a mood"}
              </div>
              <div className="ob-mood-list" style={{display:"flex",flexDirection:"column",gap:10,opacity:obAutoTime ? 0.85 : 1,marginBottom:32}}>
                {[
                  { p:"dawn",    label:"Dawn",    time:"5–11am",   desc:"Warm amber",
                    icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 16 A 8 8 0 0 1 20 16"/><line x1="0" y1="16" x2="24" y2="16"/></svg> },
                  { p:"midday",  label:"Midday",  time:"11am–5pm", desc:"Cool mint",
                    icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/></svg> },
                  { p:"prime",   label:"Prime",   time:"5–10pm",   desc:"Deep blue",
                    icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg> },
                  { p:"rest",    label:"Rest",    time:"10pm–5am", desc:"Soft violet",
                    icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.5 5.5 6 .5-4.5 4 1.5 5.5L12 16l-4.5 2 1.5-5.5-4.5-4 6-.5L12 3z"/></svg> },
                ].map(({p, label, time, desc, icon}) => {
                  const ct = CIRCADIAN_THEMES[p][obTheme === "dark" ? "dark" : "light"];
                  const isSelected = obPeriod === p;
                  const isNow = getCircadianPeriod() === p;
                  const iconWithColor = React.cloneElement(icon, { stroke: ct.accent, strokeWidth: 1, fill: "none", style: { overflow: "hidden", flexShrink: 0 } });
                  return (
                    <button key={p} onClick={()=>{ setObPeriod(p); setHasChosenMood(true); }} style={{
                      display:"flex", alignItems:"center", gap:16, padding:"16px 18px",
                      borderRadius:16, cursor:"pointer", textAlign:"left", width:"100%", boxSizing:"border-box",
                      border: isSelected ? `1.5px solid ${ct.accent}` : "1px solid var(--ob-box-border)",
                      background: isSelected ? ct.accentDim : "var(--ob-box-bg)",
                      transition: "all 0.18s"
                    }}>
                      <div style={{
                        width:44, height:44, borderRadius:12, flexShrink:0, display:"flex",
                        alignItems:"center", justifyContent:"center", overflow:"hidden",
                        background: ct.bg.includes("gradient") ? ct.bg : ct.accentDim,
                        border: `1px solid ${ct.accent}`,
                        ["--accent"]: ct.accent,
                        color: ct.accent,
                      }}>{iconWithColor}</div>
                      <div style={{flex:1, minWidth:0}}>
                        <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:2}}>
                          <span style={{fontWeight:500,color:isSelected?ct.accent:"var(--ob-text-head)",fontFamily:"'Barlow',sans-serif"}}>{label}</span>
                          <span style={{color:"var(--ob-text-dim)"}}>{time}</span>
                          {isNow && <span style={{letterSpacing:"0.14em",textTransform:"uppercase",color:"var(--ob-accent)",opacity:0.7}}>now</span>}
                        </div>
                        <div style={{color:"var(--ob-text-sec)"}}>{desc}</div>
                      </div>
                      {isSelected && <div style={{width:7,height:7,borderRadius:"50%",background:ct.accent,flexShrink:0}}/>}
                    </button>
                  );
                })}
              </div>
            </div>
            {/* nav replaced by persistent footer */}
          </div>}

          {/* 6: LAUNCH — final screen, centered logo + button */}
          {cur === 6 && (
            <div className="ob-screen ob-cta-screen" style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", textAlign: "center", padding: "60px 24px" }}>
              <div className="ob-pad" style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", flex: 1, width: "100%" }}>
                <img src={obTheme === "dark" ? AXIS_LOGO_DARK : AXIS_LOGO_LIGHT} alt="AXIS" style={{ width: 200, height: "auto", objectFit: "contain", marginTop: "20vh" }} />
                <button
                  className="ob-btn-primary"
                  onClick={doLaunch}
                  style={{
                    background: "var(--ob-accent)",
                    color: "var(--ob-accent-btn-text, #0a0e1a)",
                    boxShadow: "none",
                    padding: "18px 48px",
                    fontSize: 14,
                    letterSpacing: "0.2em",
                    margin: "0 auto",
                    marginTop: "30vh",
                    textAlign: "center",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                  }}
                >
                  LET'S GET MOVING
                </button>
                <div className="ob-pad-after-cta" aria-hidden />
              </div>
            </div>
          )}

      </div>

      <div className="ob-ext-nav">
        {["Splash","Alpha","Perspective","Science+Ethics","Safety","Appearance","Launch"].map((l, i) => (
          <button key={l} className="ob-en-btn" onClick={() => go(i)}>{l}</button>
        ))}
        <button className="ob-en-btn" style={{ borderColor: "#FFBF65", color: "#FFBF65" }} onClick={() => go(6)}>→ Launch Screen</button>
      </div>
      <div className="ob-label">Tap screen or use controls · Begin buttons launch the app</div>
      {/* persistent footer — circular back/next in bottom left & right corners */}
      <div className="ob-nav-footer" style={{position: 'fixed', bottom: 0, left: 0, right: 0, paddingBottom: 'max(28px, env(safe-area-inset-bottom, 0px))', paddingTop: 24, zIndex: 99999, maxWidth: 920, margin: '0 auto', pointerEvents: 'none', display: 'flex', alignItems: 'center', boxSizing: 'border-box', paddingLeft: 24, paddingRight: 24}}>
        <button className="ob-nav-back" onClick={() => go(Math.max(0, cur - 1))} style={{position: 'absolute', left: 24, background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.12)', color: '#ffffff', borderRadius: '50%', width: 48, height: 48, minWidth: 48, minHeight: 48, cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', pointerEvents: 'auto', flexShrink: 0}}>←</button>
        <button className="ob-nav-next" onClick={() => {
          if (cur === 4) { doSafetyNext(); return; }
          if (cur === 5) { if (obPeriod == null) { setObPeriod(getCircadianPeriod()); setHasChosenMood(true); } go(6); return; }
          if (cur < total - 1) go(cur + 1);
        }} style={{position: 'absolute', right: 24, background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.12)', color: '#ffffff', borderRadius: '50%', width: 48, height: 48, minWidth: 48, minHeight: 48, display: cur === 6 ? 'none' : 'inline-flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, cursor: 'pointer', pointerEvents: 'auto', flexShrink: 0}}>→</button>
      </div>
    </div>
  );
}

try {
  if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
    showLoadErr('App libraries did not load. Check your connection and refresh.');
  } else {
    const root = document.getElementById('root');
    if (root) {
      ReactDOM.createRoot(root).render(<Onboarding theme="dark" onComplete={() => {}} />);
    }
  }
} catch (e) {
  showLoadErr('Error: ' + (e && e.message ? e.message : String(e)) + (e && e.stack ? '\n\n' + e.stack : ''));
}
</script>
</body>
</html>
