<html lang="en">
<head>

<style>

  #root { height: 100%; min-height: 100dvh; width: 100%; max-width: 100vw; overflow-x: hidden; overflow-y: hidden; }
    #load-err { display:none; position:fixed; inset:0; background:#0a0a0f; color:#ff6b6b;
      font-family:sans-serif; font-size:14px; padding:40px; white-space:pre-wrap; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="load-err" style="display:none"></div>

</html>
